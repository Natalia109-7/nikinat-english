<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Админ-панель · Наталья Николаева</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--deep:#5a4a7a;--soft:#8b7ba8;--lavender:#e8dff5;--rose:#f7d6e0;--cream:#fdf6f0}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Montserrat',sans-serif;color:#3d3554;background:linear-gradient(135deg,var(--cream),var(--lavender));background-attachment:fixed;min-height:100vh;padding:30px}
  .container{max-width:1100px;margin:0 auto}
  h1{font-family:'Cormorant Garamond',serif;font-size:42px;color:var(--deep);margin-bottom:8px}
  .sub{color:var(--soft);margin-bottom:30px;font-style:italic}
  .login-box{max-width:400px;margin:100px auto;background:white;padding:50px;border-radius:24px;box-shadow:0 10px 40px rgba(138,107,175,0.15);text-align:center}
  .login-box h2{font-family:'Cormorant Garamond',serif;color:var(--deep);margin-bottom:24px;font-size:32px}
  input,textarea,select{width:100%;padding:14px 18px;margin:8px 0;border:2px solid var(--lavender);border-radius:14px;font-family:inherit;font-size:14px;background:white;transition:all 0.3s}
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--soft)}
  textarea{min-height:120px;resize:vertical}
  .btn{padding:14px 32px;background:linear-gradient(135deg,var(--deep),var(--soft));color:white;border:none;border-radius:30px;cursor:pointer;font-weight:500;font-size:14px;box-shadow:0 6px 20px rgba(90,74,122,0.3);transition:all 0.3s}
  .btn:hover{transform:translateY(-2px)}
  .btn:disabled{opacity:0.6;cursor:not-allowed}
  .btn-danger{background:linear-gradient(135deg,#e88a9a,#d66b7e)}
  .btn-small{padding:8px 16px;font-size:12px}
  .tabs{display:flex;gap:8px;margin-bottom:30px;flex-wrap:wrap}
  .tab{padding:12px 24px;background:rgba(255,255,255,0.6);border:none;border-radius:30px;cursor:pointer;font-family:inherit;font-size:14px;transition:all 0.3s}
  .tab.active{background:linear-gradient(135deg,var(--deep),var(--soft));color:white}
  .panel{background:rgba(255,255,255,0.85);backdrop-filter:blur(10px);padding:30px;border-radius:24px;margin-bottom:30px;box-shadow:0 10px 40px rgba(138,107,175,0.1)}
  .panel h3{font-family:'Cormorant Garamond',serif;color:var(--deep);font-size:26px;margin-bottom:16px}
  .items-list{margin-top:24px}
  .item{display:flex;justify-content:space-between;align-items:center;padding:16px;background:white;border-radius:14px;margin-bottom:10px;border:1px solid var(--lavender);gap:16px}
  .item img{width:60px;height:60px;object-fit:cover;border-radius:10px}
  .item-info{flex:1;min-width:0}
  .item-info strong{color:var(--deep);display:block;margin-bottom:4px}
  .item-info small{color:var(--soft);font-size:12px}
  .hidden{display:none}
  .top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px}
  a.back{color:var(--deep);text-decoration:none;font-weight:500}
  .preview{max-width:200px;border-radius:12px;margin-top:10px}
  .notice{padding:12px;background:var(--lavender);border-radius:12px;margin-bottom:16px;font-size:13px;color:var(--deep)}
  .error{color:#c0392b;background:#fde8e8;padding:10px;border-radius:10px;margin-top:10px;font-size:13px}
</style>
</head>
<body>
<div class="container">

<!-- ЛОГИН -->
<div id="loginScreen" class="login-box">
  <h2>🔐 Вход в админ-панель</h2>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="pwd" placeholder="Пароль" onkeypress="if(event.key==='Enter')login()">
  <br><button class="btn" id="loginBtn" onclick="login()">Войти</button>
  <div id="loginError" class="error hidden"></div>
  <p style="margin-top:20px;font-size:12px;color:var(--soft)">Используйте email и пароль из Firebase Authentication</p>
</div>

<!-- ПАНЕЛЬ -->
<div id="adminPanel" class="hidden">
  <div class="top-bar">
    <div>
      <h1>Админ-панель</h1>
      <p class="sub">Управление контентом сайта</p>
    </div>
    <div>
      <a href="index.html" class="back">← На сайт</a>
      <button class="btn btn-small" onclick="logout()" style="margin-left:12px">Выйти</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="programs">📚 Программы</button>
    <button class="tab" data-tab="trainers">🎮 Тренажёры</button>
    <button class="tab" data-tab="articles">📝 Статьи</button>
    <button class="tab" data-tab="videos">🎬 Видео</button>
    <button class="tab" data-tab="gallery">🖼️ Фото</button>
  </div>

  <!-- ПРОГРАММЫ -->
  <div class="panel tab-panel" data-panel="programs">
    <h3>Добавить программу</h3>
    <input type="text" id="prog_title" placeholder="Название программы">
    <textarea id="prog_desc" placeholder="Описание программы"></textarea>
    <input type="file" id="prog_img" accept="image/*">
    <img id="prog_preview" class="preview hidden">
    <br><button class="btn" id="prog_btn" onclick="addProgram()">Добавить</button>
    <div class="items-list" id="programs_list"></div>
  </div>

  <!-- ТРЕНАЖЁРЫ -->
  <div class="panel tab-panel hidden" data-panel="trainers">
    <h3>Добавить тренажёр</h3>
    <div class="notice">💡 Загрузите HTML-файл тренажёра в репозиторий GitHub, затем укажите путь к нему (например: trainers/my-trainer.html)</div>
    <input type="text" id="trainer_title" placeholder="Название тренажёра">
    <textarea id="trainer_desc" placeholder="Описание тренажёра"></textarea>
