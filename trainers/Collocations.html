<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Translation Challenge · Natalie English</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --lavender: #e8dff5;
            --peach: #fce4d6;
            --mint: #d4f1e8;
            --rose: #f7d6e0;
            --cream: #fdf6f0;
            --deep: #5a4a7a;
            --soft: #8b7ba8;
            --text: #3d3554;
            --text-light: #8b7ba8;
            --success: #6ba889;
            --danger: #c97b84;
            --warning: #d4a574;
            --shadow: 0 10px 40px rgba(138,107,175,0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, var(--cream) 0%, var(--lavender) 50%, var(--peach) 100%);
            background-attachment: fixed;
            min-height: 100vh;
            padding: 20px;
            color: var(--text);
            overflow-x: hidden;
        }

        /* Плавающие декоративные круги */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            z-index: -1;
            animation: float 20s infinite ease-in-out;
        }
        .blob1 { width: 400px; height: 400px; background: var(--rose); top: -100px; left: -100px; }
        .blob2 { width: 500px; height: 500px; background: var(--mint); bottom: -150px; right: -150px; animation-delay: -10s; }
        .blob3 { width: 300px; height: 300px; background: var(--lavender); top: 50%; left: 50%; animation-delay: -5s; }

        @keyframes float {
            0%,100% { transform: translate(0,0) scale(1); }
            33% { transform: translate(50px,-50px) scale(1.1); }
            66% { transform: translate(-30px,40px) scale(0.95); }
        }

        /* Верхняя навигация */
        .top-nav {
            max-width: 800px;
            margin: 0 auto 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background: rgba(253,246,240,0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow: var(--shadow);
        }

        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 22px;
            font-weight: 600;
            color: var(--deep);
            letter-spacing: 1px;
        }
        .logo span { color: var(--soft); font-style: italic; }

        .back-btn {
            padding: 10px 22px;
            background: linear-gradient(135deg, var(--deep), var(--soft));
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            box-shadow: 0 6px 20px rgba(90,74,122,0.25);
            transition: all 0.3s;
        }
        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(90,74,122,0.35);
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 30px 20px;
            background: rgba(255,255,255,0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.6);
            box-shadow: var(--shadow);
        }

        header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.8em;
            font-weight: 500;
            color: var(--deep);
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        header p {
            color: var(--soft);
            font-size: 1.05em;
            font-style: italic;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .stat-box {
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 16px 24px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.8);
            box-shadow: var(--shadow);
            min-width: 120px;
            text-align: center;
            transition: all 0.3s;
        }
        .stat-box:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(138,107,175,0.25);
        }

        .stat-label {
            font-size: 0.75em;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .stat-value {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8em;
            font-weight: 600;
            color: var(--deep);
        }

        .card {
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.8);
            border-radius: 30px;
            padding: 40px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
            transition: all 0.4s;
            animation: slideUp 0.6s ease;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 50px rgba(138,107,175,0.25);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .question-image {
            max-width: 100%;
            max-height: 300px;
            border-radius: 20px;
            margin-bottom: 25px;
            display: none;
            object-fit: cover;
            box-shadow: var(--shadow);
        }
        .question-image.active { display: block; }

        .question-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8em;
            font-weight: 500;
            color: var(--deep);
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .hint {
            color: var(--text-light);
            font-size: 0.95em;
            margin-bottom: 25px;
            font-style: italic;
            padding: 12px 18px;
            background: rgba(232,223,245,0.3);
            border-left: 3px solid var(--soft);
            border-radius: 10px;
        }

        .input-area { margin-bottom: 25px; }

        input[type="text"] {
            width: 100%;
            padding: 16px 20px;
            font-size: 1.05em;
            font-family: 'Montserrat', sans-serif;
            border: 2px solid var(--lavender);
            border-radius: 18px;
            background: rgba(255,255,255,0.8);
            color: var(--text);
            transition: all 0.3s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: var(--soft);
            box-shadow: 0 0 0 4px rgba(139,123,168,0.15);
        }
        input[type="text"].correct {
            border-color: var(--success);
            background: rgba(212,241,232,0.4);
            color: var(--success);
            font-weight: 500;
        }
        input[type="text"].incorrect {
            border-color: var(--danger);
            background: rgba(247,214,224,0.4);
            color: var(--danger);
            font-weight: 500;
        }

        .buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            font-size: 0.95em;
            font-family: 'Montserrat', sans-serif;
            font-weight: 500;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 0.3px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--deep), var(--soft));
            color: white;
            box-shadow: 0 6px 18px rgba(90,74,122,0.25);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(90,74,122,0.35);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.7);
            color: var(--deep);
            border: 1px solid var(--lavender);
        }
        .btn-secondary:hover {
            background: linear-gradient(135deg, var(--lavender), var(--rose));
            transform: translateY(-2px);
        }

        .btn-image {
            background: linear-gradient(135deg, var(--warning), var(--peach));
            color: var(--deep);
            font-weight: 500;
        }
        .btn-image:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(212,165,116,0.3);
        }

        .feedback {
            margin-top: 25px;
            padding: 20px;
            border-radius: 18px;
            display: none;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .feedback.correct {
            display: block;
            background: rgba(212,241,232,0.6);
            border-left: 4px solid var(--success);
            color: #2d6a5a;
        }

        .feedback.incorrect {
            display: block;
            background: rgba(247,214,224,0.6);
            border-left: 4px solid var(--danger);
            color: #8b3a4a;
        }

        .correct-answer {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
            font-size: 1.3em;
            margin-top: 10px;
            color: var(--deep);
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(232,223,245,0.5);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 25px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--success), var(--soft), var(--deep));
            transition: width 0.5s;
            border-radius: 4px;
        }

        .category-selector { margin-bottom: 25px; }

        select {
            width: 100%;
            padding: 14px 18px;
            font-size: 1em;
            font-family: 'Montserrat', sans-serif;
            border: 2px solid var(--lavender);
            border-radius: 18px;
            background: rgba(255,255,255,0.8);
            color: var(--text);
            cursor: pointer;
            transition: all 0.3s;
        }
        select:focus {
            outline: none;
            border-color: var(--soft);
        }

        #fileInput { display: none; }

        .image-preview {
            position: relative;
            display: inline-block;
            margin-bottom: 15px;
        }

        .remove-image {
            position: absolute;
            top: 8px;
            right: 8px;
            background: var(--danger);
            color: white;
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            cursor: pointer;
            font-size: 1.2em;
            line-height: 1;
            transition: all 0.3s;
        }
        .remove-image:hover {
            transform: scale(1.1);
        }

        .bottom-buttons {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        @media (max-width: 600px) {
            header h1 { font-size: 2em; }
            .card { padding: 25px; }
            .question-text { font-size: 1.4em; }
            .top-nav { padding: 12px 18px; }
            .logo { font-size: 18px; }
            .stat-box { padding: 12px 18px; min-width: 90px; }
            .stat-value { font-size: 1.4em; }
        }
    </style>
</head>
<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>

<div class="top-nav">
    <div class="logo">Natalie <span>English</span></div>
    <a href="../index.html" class="back-btn">← На главную</a>
</div>

<div class="container">
    <header>
        <h1>🧠 Translation Challenge</h1>
        <p>Перевод-вызов: введите английскую коллокацию</p>
    </header>

    <div class="stats">
        <div class="stat-box">
            <div class="stat-label">Правильно</div>
            <div class="stat-value" id="correctCount">0</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Неправильно</div>
            <div class="stat-value" id="incorrectCount">0</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Всего вопросов</div>
            <div class="stat-value" id="totalCount">0</div>
        </div>
    </div>

    <div class="progress-bar">
        <div class="progress-fill" id="progressBar" style="width: 0%"></div>
    </div>

    <div class="card">
        <div class="category-selector">
            <select id="categorySelect">
                <option value="all">Все темы</option>
                <option value="family">Family (Семья)</option>
                <option value="relationships">Relationships (Отношения)</option>
                <option value="appearance">Appearance (Внешность)</option>
                <option value="feelings">Feelings (Чувства)</option>
                <option value="work">Work (Работа)</option>
                <option value="business">Business (Бизнес)</option>
                <option value="travel">Travel (Путешествия)</option>
                <option value="food">Food (Еда)</option>
                <option value="health">Health (Здоровье)</option>
                <option value="other">Другое</option>
            </select>
        </div>

        <img id="questionImage" class="question-image" alt="Question image">

        <div class="question-text" id="questionText">
            Загрузка вопроса...
        </div>

        <div class="hint" id="questionHint"></div>

        <div class="input-area">
            <input type="text" id="answerInput" placeholder="Введите английскую коллокацию..." autocomplete="off">
        </div>

        <div class="buttons">
            <button class="btn-primary" onclick="checkAnswer()">Проверить</button>
            <button class="btn-secondary" onclick="nextQuestion()">Пропустить →</button>
            <button class="btn-image" onclick="document.getElementById('fileInput').click()">📷 Добавить картинку</button>
            <input type="file" id="fileInput" accept="image/*" onchange="handleImageUpload(event)">
        </div>

        <div class="feedback" id="feedback">
            <div id="feedbackText"></div>
            <div class="correct-answer" id="correctAnswer"></div>
        </div>
    </div>

    <div class="bottom-buttons">
        <button class="btn-secondary" onclick="shuffleQuestions()">🔀 Перемешать вопросы</button>
        <button class="btn-secondary" onclick="resetStats()">🔄 Сбросить статистику</button>
    </div>
</div>

    let currentQuestion = 0;
    let correctCount = 0;
    let incorrectCount = 0;
    let currentImage = null;
    let shuffledQuestions = [...questions];

    function init() {
        shuffleArray(shuffledQuestions);
        loadQuestion();
        updateStats();
    }

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    function filterQuestions() {
        const category = document.getElementById('categorySelect').value;
        if (category === 'all') return shuffledQuestions;
        return shuffledQuestions.filter(q => q.category === category);
    }

    function loadQuestion() {
        const filtered = filterQuestions();
        if (filtered.length === 0) {
            document.getElementById('questionText').textContent = "Нет вопросов в этой категории";
            return;
        }
        const q = filtered[currentQuestion % filtered.length];
        document.getElementById('questionText').textContent = q.ru;
        document.getElementById('questionHint').textContent = q.hint || '';
        document.getElementById('answerInput').value = '';
        document.getElementById('answerInput').className = '';
        document.getElementById('feedback').className = 'feedback';
        if (currentImage) {
            document.getElementById('questionImage').src = currentImage;
            document.getElementById('questionImage').classList.add('active');
        } else {
            document.getElementById('questionImage').classList.remove('active');
        }
        document.getElementById('totalCount').textContent = filtered.length;
        updateProgress();
    }

    function checkAnswer() {
        const filtered = filterQuestions();
        if (filtered.length === 0) return;
        const q = filtered[currentQuestion % filtered.length];
        const userAnswer = document.getElementById('answerInput').value.trim().toLowerCase();
        const feedback = document.getElementById('feedback');
        const feedbackText = document.getElementById('feedbackText');
        const correctAnswer = document.getElementById('correctAnswer');
        const input = document.getElementById('answerInput');
        if (!userAnswer) { alert('Введите ответ!'); return; }
        const isCorrect = q.en.some(ans => ans.toLowerCase() === userAnswer);
        if (isCorrect) {
            correctCount++;
            input.className = 'correct';
            feedback.className = 'feedback correct';
            feedbackText.textContent = '✅ Правильно! Отличная работа!';
        } else {
            incorrectCount++;
            input.className = 'incorrect';
            feedback.className = 'feedback incorrect';
            feedbackText.textContent = '❌ Неправильно. Правильный ответ:';
        }
        correctAnswer.textContent = q.en.join(' / ');
        updateStats();
        setTimeout(() => nextQuestion(), 2500);
    }

    function nextQuestion() {
        currentQuestion++;
        currentImage = null;
        loadQuestion();
    }

    function updateStats() {
        document.getElementById('correctCount').textContent = correctCount;
        document.getElementById('incorrectCount').textContent = incorrectCount;
    }

    function updateProgress() {
        const filtered = filterQuestions();
        const progress = ((currentQuestion % filtered.length) / filtered.length) * 100;
        document.getElementById('progressBar').style.width = progress + '%';
    }

    function handleImageUpload(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                currentImage = e.target.result;
                const img = document.getElementById('questionImage');
                img.src = currentImage;
                img.classList.add('active');
            };
            reader.readAsDataURL(file);
        }
    }

    function shuffleQuestions() {
        shuffleArray(shuffledQuestions);
        currentQuestion = 0;
        currentImage = null;
        loadQuestion();
    }

    function resetStats() {
        correctCount = 0;
        incorrectCount = 0;
        currentQuestion = 0;
        currentImage = null;
        updateStats();
        loadQuestion();
    }

    document.getElementById('answerInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') checkAnswer();
    });

    document.getElementById('categorySelect').addEventListener('change', function() {
        currentQuestion = 0;
        currentImage = null;
        loadQuestion();
    });

    init();
</script>
