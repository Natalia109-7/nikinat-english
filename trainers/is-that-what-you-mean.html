<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Is That What You Mean? · Natalie English</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #5a4a7a;
  --success: #6ba889;
  --danger: #c97b84;
  --warning: #d4a574;
  --bg: #fdf6f0;
  --card: rgba(255,255,255,0.7);
  --card-solid: #ffffff;
  --text: #3d3554;
  --text-light: #8b7ba8;
  --border: #e8dff5;
  --lavender: #e8dff5;
  --peach: #fce4d6;
  --mint: #d4f1e8;
  --rose: #f7d6e0;
  --cream: #fdf6f0;
  --deep: #5a4a7a;
  --soft: #8b7ba8;
  --shadow: 0 10px 40px rgba(138,107,175,0.15);
}

body.dark {
  --bg: #2a2438;
  --card: rgba(60,50,80,0.7);
  --card-solid: #3c3250;
  --text: #f0e8f5;
  --text-light: #b8a8d0;
  --border: #4a3a6a;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Montserrat', sans-serif;
  background: linear-gradient(135deg, var(--cream) 0%, var(--lavender) 50%, var(--peach) 100%);
  background-attachment: fixed;
  color: var(--text);
  min-height: 100vh;
  display: flex;
  transition: 0.4s;
  overflow-x: hidden;
}

.blob {
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.4;
  z-index: -1;
  animation: float 20s infinite ease-in-out;
}
.blob1 { width: 400px; height: 400px; background: var(--rose); top: -100px; left: -100px; }
.blob2 { width: 500px; height: 500px; background: var(--mint); bottom: -150px; right: -150px; animation-delay: -10s; }
.blob3 { width: 300px; height: 300px; background: var(--lavender); top: 50%; left: 50%; animation-delay: -5s; }

@keyframes float {
  0%,100% { transform: translate(0,0) scale(1); }
  33% { transform: translate(50px,-50px) scale(1.1); }
  66% { transform: translate(-30px,40px) scale(0.95); }
}

.top-nav {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 20px;
  background: rgba(253,246,240,0.7);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  padding: 12px 25px;
  border-radius: 40px;
  border: 1px solid rgba(255,255,255,0.5);
  box-shadow: var(--shadow);
}

.logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 600;
  color: var(--deep);
  letter-spacing: 1px;
}
.logo span { color: var(--soft); font-style: italic; }

.back-btn {
  padding: 8px 20px;
  background: linear-gradient(135deg, var(--deep), var(--soft));
  color: white;
  text-decoration: none;
  border-radius: 30px;
  font-size: 13px;
  font-weight: 500;
  box-shadow: 0 6px 20px rgba(90,74,122,0.25);
  transition: all 0.3s;
}
.back-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(90,74,122,0.35); }

.theme-toggle {
  background: rgba(255,255,255,0.6);
  border: 1px solid rgba(232,223,245,0.8);
  border-radius: 50%;
  width: 38px;
  height: 38px;
  cursor: pointer;
  font-size: 1.1em;
  transition: all 0.3s;
}
.theme-toggle:hover { background: linear-gradient(135deg, var(--lavender), var(--rose)); transform: rotate(180deg); }

.sidebar {
  width: 290px;
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  padding: 90px 22px 22px;
  box-shadow: var(--shadow);
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  border-right: 1px solid rgba(255,255,255,0.6);
  margin-top: 80px;
  margin-left: 20px;
  margin-bottom: 20px;
  border-radius: 30px;
  height: calc(100vh - 100px);
  position: sticky;
  top: 20px;
}

.sidebar h2 {
  font-family: 'Cormorant Garamond', serif;
  color: var(--deep);
  font-size: 1.3em;
  font-weight: 500;
  border-bottom: 2px solid var(--lavender);
  padding-bottom: 10px;
  margin-bottom: 12px;
  letter-spacing: 0.5px;
}

.sidebar button {
  display: block;
  width: 100%;
  padding: 12px 16px;
  margin: 5px 0;
  border: 1px solid rgba(232,223,245,0.8);
  background: rgba(255,255,255,0.7);
  color: var(--text);
  border-radius: 16px;
  cursor: pointer;
  text-align: left;
  transition: all 0.3s;
  font-size: 0.9em;
  font-family: 'Montserrat', sans-serif;
  font-weight: 400;
}

.sidebar button:hover {
  background: linear-gradient(135deg, var(--lavender), var(--rose));
  color: var(--deep);
  transform: translateX(5px);
  box-shadow: 0 6px 18px rgba(138,107,175,0.2);
}

.sidebar button.active {
  background: linear-gradient(135deg, var(--deep), var(--soft));
  color: white;
  border-color: transparent;
  box-shadow: 0 6px 20px rgba(90,74,122,0.3);
  font-weight: 500;
}

.sidebar button.special {
  background: linear-gradient(135deg, var(--warning), var(--peach));
  color: var(--deep);
  font-weight: 500;
}
.sidebar button.special:hover {
  background: linear-gradient(135deg, #c99560, var(--warning));
  color: white;
}

.sidebar-info {
  margin-top: auto;
  padding-top: 20px;
  border-top: 1px solid var(--lavender);
  font-size: 0.75em;
  color: var(--text-light);
  line-height: 1.6;
}

.sidebar-info kbd {
  background: var(--card-solid);
  padding: 2px 6px;
  border-radius: 4px;
  border: 1px solid var(--border);
  font-family: monospace;
  font-size: 0.9em;
  box-shadow: 0 1px 0 var(--border);
}

.sidebar-info strong { color: var(--deep); }

.main {
  flex: 1;
  padding: 100px 30px 30px;
  overflow-y: auto;
  max-width: calc(100% - 330px);
}

.card {
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.8);
  border-radius: 24px;
  padding: 25px;
  margin-bottom: 20px;
  box-shadow: var(--shadow);
  border-left: 5px solid var(--soft);
  transition: all 0.4s;
  animation: slideUp 0.6s ease backwards;
}

.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 20px 50px rgba(138,107,175,0.25);
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

.wrong {
  color: var(--danger);
  font-weight: 500;
  font-size: 1.1em;
}
.correct {
  color: var(--success);
  font-weight: 500;
  font-size: 1.1em;
}
.explain {
  background: rgba(232,223,245,0.4);
  padding: 14px;
  border-radius: 14px;
  margin: 12px 0;
  font-size: 0.95em;
  color: var(--text);
  line-height: 1.6;
  border-left: 3px solid var(--soft);
}

/* Images container - 2 images side by side */
.images-container {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
  margin-top: 15px;
}

.img-box {
  min-height: 200px;
  max-height: 350px;
  border: 2px dashed var(--soft);
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  cursor: pointer;
  position: relative;
  background: rgba(253,246,240,0.5);
  overflow: hidden;
  transition: all 0.3s ease;
}
.img-box:hover {
  border-color: var(--deep);
  background: rgba(232,223,245,0.3);
}
.img-box.target-hover {
  border-color: var(--deep);
  border-style: solid;
  box-shadow: 0 0 0 3px rgba(90,74,122,0.2);
  background: rgba(232,223,245,0.4);
}
.img-box.target-active {
  border-color: var(--success);
  border-style: solid;
  box-shadow: 0 0 0 3px rgba(107,168,137,0.3);
  background: rgba(212,241,232,0.3);
}
.img-box.target-active::after {
  content: '🎯 Целевая карточка для Ctrl+V';
  position: absolute;
  top: 8px;
  left: 8px;
  background: var(--success);
  color: white;
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 0.75em;
  font-weight: 500;
  z-index: 5;
}
.img-box img {
  max-width: 100%;
  max-height: 330px;
  object-fit: contain;
  cursor: pointer;
  border-radius: 12px;
}
.img-box .placeholder {
  font-size: 3em;
  margin-bottom: 10px;
  opacity: 0.6;
}
.img-box .hint {
  font-size: 0.8em;
  color: var(--text-light);
  text-align: center;
  padding: 8px;
  line-height: 1.5;
}
.img-box .hint strong { color: var(--deep); }

.img-box.readonly {
  cursor: default;
  border-style: solid;
  border-color: var(--border);
}
.img-box.readonly:hover {
  border-color: var(--border);
  background: rgba(253,246,240,0.5);
}

/* Image number label */
.img-label {
  position: absolute;
  top: 8px;
  right: 8px;
  background: var(--deep);
  color: white;
  padding: 4px 10px;
  border-radius: 12px;
  font-size: 0.75em;
  font-weight: 600;
  z-index: 5;
}

.practice-a-item {
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.7);
  border-radius: 18px;
  padding: 18px;
  margin-bottom: 12px;
  transition: all 0.3s;
  box-shadow: 0 4px 15px rgba(138,107,175,0.08);
}
.practice-a-item.answered-correct {
  background: rgba(212,241,232,0.5);
  border-left: 4px solid var(--success);
}
.practice-a-item.answered-wrong {
  background: rgba(247,214,224,0.5);
  border-left: 4px solid var(--danger);
}
.practice-a-item.hidden-item { display: none; }

.btn {
  padding: 10px 20px;
  border: none;
  border-radius: 25px;
  cursor: pointer;
  margin-right: 8px;
  margin-bottom: 5px;
  font-weight: 500;
  transition: all 0.3s;
  font-size: 0.9em;
  font-family: 'Montserrat', sans-serif;
  letter-spacing: 0.3px;
}
.btn-right {
  background: linear-gradient(135deg, var(--success), #5a9678);
  color: white;
  box-shadow: 0 4px 12px rgba(107,168,137,0.3);
}
.btn-wrong {
  background: linear-gradient(135deg, var(--danger), #b56870);
  color: white;
  box-shadow: 0 4px 12px rgba(201,123,132,0.3);
}
.btn-primary {
  background: linear-gradient(135deg, var(--deep), var(--soft));
  color: white;
  box-shadow: 0 6px 18px rgba(90,74,122,0.25);
}
.btn-warning {
  background: linear-gradient(135deg, var(--warning), #c49560);
  color: white;
  box-shadow: 0 4px 12px rgba(212,165,116,0.3);
}
.btn:hover {
  opacity: 0.95;
  transform: translateY(-2px);
}
.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

.answer-box {
  margin-top: 12px;
  padding: 14px;
  background: rgba(253,246,240,0.6);
  border-radius: 14px;
  display: none;
  border-left: 4px solid var(--success);
  line-height: 1.6;
}

.fill-blank {
  border: none;
  border-bottom: 2px solid var(--soft);
  width: 130px;
  text-align: center;
  font-size: 1em;
  padding: 4px;
  margin: 0 5px;
  background: transparent;
  color: var(--text);
  font-family: 'Montserrat', sans-serif;
  transition: all 0.3s;
}
.fill-blank:focus {
  outline: none;
  border-bottom-color: var(--deep);
}
.fill-blank.correct {
  border-bottom-color: var(--success);
  background: rgba(212,241,232,0.4);
  color: var(--success);
  font-weight: 600;
}
.fill-blank.wrong {
  border-bottom-color: var(--danger);
  background: rgba(247,214,224,0.4);
  color: var(--danger);
  font-weight: 600;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 25px;
  flex-wrap: wrap;
  gap: 15px;
}
.header h1 {
  font-family: 'Cormorant Garamond', serif;
  color: var(--deep);
  font-size: 2em;
  font-weight: 500;
  letter-spacing: 0.5px;
}

.stats {
  display: flex;
  gap: 15px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.stat-box {
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(10px);
  padding: 14px 22px;
  border-radius: 18px;
  box-shadow: var(--shadow);
  min-width: 110px;
  border: 1px solid rgba(255,255,255,0.8);
}
.stat-box .label {
  font-size: 0.75em;
  color: var(--text-light);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 4px;
}
.stat-box .value {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.8em;
  font-weight: 600;
  color: var(--deep);
}

.progress-bar {
  width: 100%;
  height: 8px;
  background: rgba(232,223,245,0.5);
  border-radius: 4px;
  overflow: hidden;
  margin: 10px 0;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--success), var(--soft), var(--deep));
  transition: width 0.5s;
  border-radius: 4px;
}

.flashcard {
  perspective: 1000px;
  height: 380px;
  margin: 25px 0;
}
.flashcard-inner {
  position: relative;
  width: 100%;
  height: 100%;
  transition: transform 0.7s;
  transform-style: preserve-3d;
  cursor: pointer;
}
.flashcard.flipped .flashcard-inner { transform: rotateY(180deg); }
.flashcard-front, .flashcard-back {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  border-radius: 24px;
  padding: 35px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  box-shadow: var(--shadow);
}
.flashcard-front {
  background: linear-gradient(135deg, var(--rose), var(--peach));
  color: var(--deep);
}
.flashcard-back {
  background: linear-gradient(135deg, var(--mint), var(--lavender));
  color: var(--deep);
  transform: rotateY(180deg);
}
.flashcard .emoji { font-size: 4em; margin-bottom: 18px; }
.flashcard .sentence {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.6em;
  font-weight: 500;
  margin-bottom: 18px;
  line-height: 1.3;
}
.flashcard .explanation {
  font-size: 1em;
  line-height: 1.6;
  opacity: 0.9;
}
.flashcard-controls {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin-top: 20px;
  align-items: center;
}
.flashcard-controls span {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.2em;
  color: var(--deep);
  padding: 8px 16px;
}

.filter-bar {
  display: flex;
  gap: 10px;
  margin-bottom: 18px;
  flex-wrap: wrap;
}
.filter-bar button {
  padding: 8px 16px;
  font-size: 0.85em;
  background: rgba(255,255,255,0.6);
  color: var(--text);
  border: 1px solid rgba(232,223,245,0.8);
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.3s;
  font-family: 'Montserrat', sans-serif;
}
.filter-bar button:hover {
  background: rgba(232,223,245,0.8);
}
.filter-bar button.active {
  background: linear-gradient(135deg, var(--deep), var(--soft));
  color: white;
  border-color: transparent;
}

.toast {
  position: fixed;
  bottom: 25px;
  right: 25px;
  background: linear-gradient(135deg, var(--success), #5a9678);
  color: white;
  padding: 14px 24px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(107,168,137,0.4);
  z-index: 1000;
  animation: slideIn 0.4s;
  font-weight: 500;
}
.toast.error { background: linear-gradient(135deg, var(--danger), #b56870); box-shadow: 0 10px 30px rgba(201,123,132,0.4); }
.toast.info { background: linear-gradient(135deg, var(--deep), var(--soft)); box-shadow: 0 10px 30px rgba(90,74,122,0.4); }

@keyframes slideIn {
  from { transform: translateX(400px); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

.modal-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(42,36,56,0.6);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 2000;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: fadeIn 0.3s;
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
.modal {
  background: var(--card-solid);
  border-radius: 24px;
  padding: 35px;
  max-width: 420px;
  width: 90%;
  box-shadow: 0 25px 80px rgba(90,74,122,0.3);
  animation: scaleIn 0.3s;
  text-align: center;
}
@keyframes scaleIn {
  from { transform: scale(0.9); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
.modal h2 {
  font-family: 'Cormorant Garamond', serif;
  color: var(--deep);
  font-size: 1.8em;
  margin-bottom: 10px;
}
.modal p {
  color: var(--text-light);
  margin-bottom: 20px;
  font-size: 0.95em;
}
.modal input {
  width: 100%;
  padding: 14px 18px;
  border: 2px solid var(--border);
  border-radius: 16px;
  font-size: 1.2em;
  text-align: center;
  font-family: 'Montserrat', sans-serif;
  letter-spacing: 8px;
  color: var(--deep);
  background: rgba(253,246,240,0.5);
  transition: all 0.3s;
  margin-bottom: 18px;
}
.modal input:focus {
  outline: none;
  border-color: var(--deep);
  box-shadow: 0 0 0 3px rgba(90,74,122,0.15);
}
.modal .btn { margin: 5px; }

.admin-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: linear-gradient(135deg, var(--success), #5a9678);
  color: white;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 0.8em;
  font-weight: 500;
  box-shadow: 0 4px 12px rgba(107,168,137,0.3);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%,100% { box-shadow: 0 4px 12px rgba(107,168,137,0.3); }
  50% { box-shadow: 0 4px 20px rgba(107,168,137,0.5); }
}

.admin-img-panel {
  position: absolute;
  top: 8px;
  right: 8px;
  display: flex;
  gap: 6px;
  z-index: 10;
}
.admin-img-panel button {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  font-size: 0.85em;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s;
  box-shadow: 0 3px 10px rgba(0,0,0,0.15);
}
.admin-img-panel .btn-replace {
  background: linear-gradient(135deg, var(--deep), var(--soft));
  color: white;
}
.admin-img-panel .btn-delete {
  background: linear-gradient(135deg, var(--danger), #b56870);
  color: white;
}
.admin-img-panel button:hover {
  transform: scale(1.15);
}

@media (max-width: 900px) {
  body { flex-direction: column; }
  .sidebar {
    width: 100%;
    margin: 80px 10px 10px;
    height: auto;
    max-height: 300px;
    position: relative;
    top: 0;
  }
  .main {
    max-width: 100%;
    padding: 20px;
  }
  .top-nav {
    width: calc(100% - 20px);
    justify-content: space-between;
  }
  .logo { font-size: 18px; }
  .header h1 { font-size: 1.5em; }
  .images-container {
    grid-template-columns: 1fr;
  }
}
</style>
</head>
<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>
<div class="sidebar">
  <h2>📚 Units</h2>
  <div id="unit-buttons"></div>
  <h2 style="margin-top:20px;">📝 Mode</h2>
  <button onclick="setMode('theory')" id="btn-theory" class="active">📖 Theory (Правила)</button>
  <button onclick="setMode('flashcards')" id="btn-flashcards">🎴 Flashcards</button>
  <button onclick="setMode('practiceA')" id="btn-practiceA">✅ Practice A (True/False)</button>
  <button onclick="setMode('practiceB')" id="btn-practiceB">✏️ Practice B (Fill gaps)</button>
  <button onclick="setMode('randomTest')" id="btn-randomTest" class="special">🎲 Случайный тест</button>
  <h2 style="margin-top:20px;">⚙️ Tools</h2>
  <button onclick="exportProgress()">💾 Экспорт прогресса</button>
  <button onclick="document.getElementById('import-file').click()">📂 Импорт прогресса</button>

const ADMIN_CODE = "01051";
let isAdmin = false;

// ==================== STATE ====================
let currentUnit = 1;
let currentMode = 'theory';
let currentFlashcard = 0;
let stats = JSON.parse(localStorage.getItem('trainer_stats') || '{}');
let userAnswers = JSON.parse(localStorage.getItem('trainer_answers') || '{}');
let filterMode = 'all';
let currentTargetBox = null;

// ==================== INIT ====================
function init() {
    renderUnitButtons();
    setMode('theory');
    if (localStorage.getItem('trainer_theme') === 'dark') document.body.classList.add('dark');
    document.addEventListener('paste', handleGlobalPaste);
    updateAdminUI();
    
    if (window.self !== window.top) {
        document.querySelectorAll('a').forEach(link => {
            if (!link.target) link.target = '_top';
        });
    }
}

function renderUnitButtons() {
    const container = document.getElementById('unit-buttons');
    container.innerHTML = '';
    for (let i = 1; i <= 5; i++) {
        const btn = document.createElement('button');
        btn.innerText = `Unit ${i}`;
        btn.onclick = () => selectUnit(i);
        if (i === currentUnit) btn.classList.add('active');
        container.appendChild(btn);
    }
}

function selectUnit(unit) {
    currentUnit = unit;
    currentFlashcard = 0;
    currentTargetBox = null;
    renderUnitButtons();
    renderContent();
}

function setMode(mode) {
    currentMode = mode;
    document.querySelectorAll('.sidebar button').forEach(b => b.classList.remove('active'));
    document.getElementById(`btn-${mode}`).classList.add('active');
    currentTargetBox = null;
    renderContent();
}

function toggleTheme() {
    document.body.classList.toggle('dark');
    localStorage.setItem('trainer_theme', document.body.classList.contains('dark') ? 'dark' : 'light');
}

// ==================== ADMIN FUNCTIONS ====================
function showAdminLogin() {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.id = 'admin-modal';
    overlay.innerHTML = `
        <div class="modal">
            <h2>🔐 Админ-панель</h2>
            <p>Введите код доступа для управления картинками</p>
            <input type="password" id="admin-code-input" maxlength="5" placeholder="•••••" autocomplete="off">
            <div>
                <button class="btn btn-primary" onclick="checkAdminCode()">Войти</button>
                <button class="btn btn-wrong" onclick="closeAdminModal()">Отмена</button>
            </div>
            <p id="admin-error" style="color:var(--danger); margin-top:12px; display:none; font-size:0.9em;">❌ Неверный код</p>
        </div>
    `;
    document.body.appendChild(overlay);
    
    setTimeout(() => {
        const input = document.getElementById('admin-code-input');
        input.focus();
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') checkAdminCode();
        });
    }, 100);
}

function checkAdminCode() {
    const input = document.getElementById('admin-code-input');
    if (input.value === ADMIN_CODE) {
        isAdmin = true;
        sessionStorage.setItem('admin_mode', 'true');
        closeAdminModal();
        updateAdminUI();
        renderContent();

    } else {
        const error = document.getElementById('admin-error');
        error.style.display = 'block';
        input.value = '';
        input.focus();
        input.style.borderColor = 'var(--danger)';
        setTimeout(() => {
            input.style.borderColor = '';
        }, 1000);
    }
}

function closeAdminModal() {
    const modal = document.getElementById('admin-modal');
    if (modal) modal.remove();
}

function adminLogout() {
    if (!confirm('Выйти из админ-панели?')) return;
    isAdmin = false;
    sessionStorage.removeItem('admin_mode');
    currentTargetBox = null;
    updateAdminUI();
    renderContent();
    showToast('🚪 Вы вышли из админ-панели');
}

function updateAdminUI() {
    if (sessionStorage.getItem('admin_mode') === 'true') {
        isAdmin = true;
    }
    
    const loginBtn = document.getElementById('btn-admin-login');
    const logoutBtn = document.getElementById('btn-admin-logout');
    
    if (isAdmin) {
        loginBtn.style.display = 'none';
        logoutBtn.style.display = 'block';
    } else {
        loginBtn.style.display = 'block';
        logoutBtn.style.display = 'none';
    }
    
    const controls = document.getElementById('header-controls');
    if (isAdmin) {
        controls.innerHTML = `<span class="admin-badge">👑 Администратор</span>`;
    } else {
        controls.innerHTML = '';
    }
}

function renderContent() {
    const title = document.getElementById('main-title');
    const area = document.getElementById('content-area');
    const statsArea = document.getElementById('stats-area');
    const filterBar = document.getElementById('filter-bar');
    const controls = document.getElementById('header-controls');
    
    area.innerHTML = '';
    statsArea.innerHTML = '';
    filterBar.innerHTML = '';
    
    const modeNames = {
        theory: '📖 Theory',
        flashcards: '🎴 Flashcards',

    };
    
    if (currentMode === 'randomTest') {
        title.innerText = '🎲 Случайный тест (все юниты)';
    } else {
        title.innerText = `Unit ${currentUnit} — ${modeNames[currentMode]}`;
    }

    if (isAdmin) {
        controls.innerHTML = `<span class="admin-badge">👑 Администратор</span>`;
    } else {
        controls.innerHTML = '';
    }

    if (currentMode === 'theory') renderTheory(area);
    else if (currentMode === 'flashcards') renderFlashcards(area);
    else if (currentMode === 'practiceA') renderPracticeA(area);
    else if (currentMode === 'practiceB') renderPracticeB(area);
    else if (currentMode === 'randomTest') renderRandomTest(area);
    
    updateStats();
}

// ==================== IMAGE HANDLING (2 IMAGES) ====================
function handleGlobalPaste(e) {
    if (!isAdmin) return;
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    const items = e.clipboardData.items;
    for (let i = 0; i < items.length; i++) {
        if (items[i].type.indexOf('image') !== -1) {
            e.preventDefault();
            const blob = items[i].getAsFile();
            const reader = new FileReader();
            reader.onload = function(event) {
                const targetBox = getTargetImageBox();
                if (targetBox) {
                    const unit = targetBox.dataset.unit;
                    const id = targetBox.dataset.id;
                    const imgNum = targetBox.dataset.imgNum;
                    saveImage(unit, id, imgNum, event.target.result);
                    showToast(`✅ Картинка ${imgNum} вставлена в Unit ${unit}, Правило #${id}`);
                } else {
                    showToast('❌ Нет активной карточки. Наведите мышь на карточку и повторите Ctrl+V', true);
                }
            };
            reader.readAsDataURL(blob);
            return;
        }
    }
}

function getTargetImageBox() {
    if (currentTargetBox && document.body.contains(currentTargetBox)) return currentTargetBox;
    const hoveredBox = document.querySelector('.img-box.target-hover');
    if (hoveredBox) return hoveredBox;
    const allBoxes = document.querySelectorAll('.img-box');
    for (let box of allBoxes) {
        const rect = box.getBoundingClientRect();
        if (rect.top >= 0 && rect.bottom <= window.innerHeight && rect.top < window.innerHeight) return box;
    }
    return null;
}

function initImageBox(unit, id, imgNum) {
    const box = document.getElementById(`img-box-${unit}-${id}-${imgNum}`);
    if (!box) return;
    box.dataset.unit = unit;
    box.dataset.id = id;
    box.dataset.imgNum = imgNum;
    
    if (!isAdmin) {
        box.classList.add('readonly');
        box.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
        });
        const savedImg = localStorage.getItem(`img_u${unit}_t${id}_n${imgNum}`);
        if (savedImg) updateImageUI(unit, id, imgNum, savedImg);
        return;
    }
    
    box.addEventListener('mouseenter', () => {
        document.querySelectorAll('.img-box.target-hover').forEach(b => {
            if (b !== box && b !== currentTargetBox) b.classList.remove('target-hover');
        });
        if (box !== currentTargetBox) box.classList.add('target-hover');
    });
    
    box.addEventListener('mouseleave', () => {
        if (box !== currentTargetBox) box.classList.remove('target-hover');
    });
    
    box.addEventListener('click', (e) => {
        if (e.target.closest('.admin-img-panel')) return;
        
        if (e.target.tagName === 'IMG') {
            const input = document.getElementById(`file-${unit}-${id}-${imgNum}`);
            if (input) input.click();
            return;
        }
        if (currentTargetBox && currentTargetBox !== box) currentTargetBox.classList.remove('target-active');
        if (currentTargetBox === box) {
            currentTargetBox.classList.remove('target-active');
            currentTargetBox = null;
        } else {
            box.classList.add('target-active');
            box.classList.remove('target-hover');
            currentTargetBox = box;
            showToast(`🎯 Карточка #${id} (изобр. ${imgNum}) зафиксирована для Ctrl+V`, false, 'info');
        }
    });
    
    const fileInput = document.getElementById(`file-${unit}-${id}-${imgNum}`);
    if (fileInput) fileInput.onchange = (e) => handleFileUpload(unit, id, imgNum, e);
    
    const savedImg = localStorage.getItem(`img_u${unit}_t${id}_n${imgNum}`);
    if (savedImg) updateImageUI(unit, id, imgNum, savedImg);
}

function handleFileUpload(unit, id, imgNum, e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(event) {
        saveImage(unit, id, imgNum, event.target.result);
        showToast(`✅ Картинка ${imgNum} заменена (Unit ${unit}, Правило #${id})`);
    };
    reader.readAsDataURL(file);
}

function saveImage(unit, id, imgNum, imgData) {
    localStorage.setItem(`img_u${unit}_t${id}_n${imgNum}`, imgData);
    updateImageUI(unit, id, imgNum, imgData);
}

function deleteImage(unit, id, imgNum) {
    if (!confirm(`Удалить картинку ${imgNum} для Unit ${unit}, Правило #${id}?`)) return;
    localStorage.removeItem(`img_u${unit}_t${id}_n${imgNum}`);
    const box = document.getElementById(`img-box-${unit}-${id}-${imgNum}`);
    if (box) {
        const theory = DATA[unit].theory[id - 1];
        box.innerHTML = `
            <div class="img-label">Картинка ${imgNum}</div>
            <div class="placeholder">${theory.emoji}</div>
            <div class="hint">
                <strong>📎 Вставить:</strong><br>
                Наведите → <kbd>PrintScreen</kbd> → <kbd>Ctrl+V</kbd><br>
                или кликните для файла
            </div>
            <input type="file" accept="image/*" id="file-${unit}-${id}-${imgNum}" style="display:none">
        `;
        initImageBox(unit, id, imgNum);
    }
    showToast('🗑️ Картинка удалена');
}

function updateImageUI(unit, id, imgNum, imgData) {
    const box = document.getElementById(`img-box-${unit}-${id}-${imgNum}`);
    if (!box) return;
    const wasActive = box.classList.contains('target-active');
    const wasHovered = box.classList.contains('target-hover');
    
    let adminPanelHtml = '';
    if (isAdmin) {
        adminPanelHtml = `
            <div class="admin-img-panel">
                <button class="btn-replace" onclick="event.stopPropagation(); document.getElementById('file-${unit}-${id}-${imgNum}').click();" title="Заменить">🔄</button>
                <button class="btn-delete" onclick="event.stopPropagation(); deleteImage(${unit}, ${id}, ${imgNum});" title="Удалить">🗑️</button>
            </div>
            <input type="file" accept="image/*" id="file-${unit}-${id}-${imgNum}" style="display:none">
        `;
    }
    
    box.innerHTML = `<div class="img-label">Картинка ${imgNum}</div><img src="${imgData}" alt="Image ${imgNum}" title="${isAdmin ? 'Кликните, чтобы заменить' : 'Изображение'}">${adminPanelHtml}`;
    if (wasActive) box.classList.add('target-active');
    if (wasHovered) box.classList.add('target-hover');
}

function showToast(message, isError = false, type = null) {
    const toast = document.createElement('div');
    toast.className = 'toast' + (isError ? ' error' : '') + (type ? ' ' + type : '');
    toast.textContent = message;
    document.body.appendChild(toast);
    setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transition = 'opacity 0.3s';
        setTimeout(() => toast.remove(), 300);
    }, 2500);
}

// ==================== PRACTICE A ====================
function renderPracticeA(area) {
    const practices = DATA[currentUnit].practiceA;
    if (!practices) {
        area.innerHTML = `<div class="card">Practice A для этого юнита недоступен.</div>`;
        return;
    }
    
    const filterBar = document.getElementById('filter-bar');
    filterBar.innerHTML = `
        <button onclick="setFilter('all')" class="${filterMode==='all'?'active':''}">Все (${practices.length})</button>
        <button onclick="setFilter('wrong')" class="${filterMode==='wrong'?'active':''}">❌ Ошибки</button>
        <button onclick="setFilter('correct')" class="${filterMode==='correct'?'active':''}">✅ Верные</button>
        <button onclick="setFilter('unanswered')" class="${filterMode==='unanswered'?'active':''}">⚪ Без ответа</button>
    `;
    
    const controls = document.getElementById('header-controls');
    let controlsHtml = isAdmin ? `<span class="admin-badge">👑 Администратор</span> ` : '';
    controlsHtml += `
        <button class="btn btn-warning" onclick="showAllAnswers()">👁️ Показать все ответы</button>
        <button class="btn btn-primary" onclick="resetUnitAnswers()">🔄 Сбросить</button>
    `;
    controls.innerHTML = controlsHtml;
    
    practices.forEach((p, idx) => {
        const key = `${currentUnit}_A_${idx}`;
        const userAns = userAnswers[key];
        const isAnswered = userAns !== undefined;
        const isCorrect = isAnswered && (userAns === p.ans);
        
        let itemClass = 'practice-a-item';
        if (isAnswered) itemClass += isCorrect ? ' answered-correct' : ' answered-wrong';
        
        if (filterMode === 'wrong' && (!isAnswered || isCorrect)) itemClass += ' hidden-item';
        if (filterMode === 'correct' && (!isAnswered || !isCorrect)) itemClass += ' hidden-item';
        if (filterMode === 'unanswered' && isAnswered) itemClass += ' hidden-item';
        
        const item = document.createElement('div');
        item.className = itemClass;
        item.id = `item-${idx}`;
        item.innerHTML = `
            <div style="margin-bottom:12px;"><strong style="color:var(--deep);">${idx + 1}.</strong> ${p.s}</div>
            <button class="btn btn-right" onclick="checkA(this, true, ${p.ans}, '${p.fix.replace(/'/g, "\\'")}', '${p.ref}', ${idx})" ${isAnswered?'disabled':''}>✅ Right</button>
            <button class="btn btn-wrong" onclick="checkA(this, false, ${p.ans}, '${p.fix.replace(/'/g, "\\'")}', '${p.ref}', ${idx})" ${isAnswered?'disabled':''}>❌ Wrong</button>
            <div class="answer-box" id="ans-${idx}" style="display:${isAnswered?'block':'none'};">
                ${isAnswered ? (isCorrect ? 
                    `<span style="color:var(--success); font-weight:600;">🎉 Верно!</span>${!p.ans ? `<br><strong>Правильный вариант:</strong> <span class="correct">${p.fix}</span>` : ''}` :
                    `<span style="color:var(--danger); font-weight:600;">❌ Ошибка.</span><br><strong>Правильный вариант:</strong> <span class="correct">${p.fix}</span>`) : ''}
                <div style="margin-top:8px; font-size:0.85em; color:var(--text-light);">📖 См. правило ${p.ref}</div>
            </div>
        `;
        area.appendChild(item);
    });
}

function setFilter(mode) {
    filterMode = mode;
    renderContent();
}

function checkA(btn, userAns, correctAns, fix, ref, idx) {
    const key = `${currentUnit}_A_${idx}`;
    userAnswers[key] = userAns;
    localStorage.setItem('trainer_answers', JSON.stringify(userAnswers));
    
    if (!stats[currentUnit]) stats[currentUnit] = {correct: 0, wrong: 0};
    const isCorrect = (userAns === correctAns);
    if (isCorrect) stats[currentUnit].correct++;
    else stats[currentUnit].wrong++;
    localStorage.setItem('trainer_stats', JSON.stringify(stats));
    
    renderContent();
}

function showAllAnswers() {
    const practices = DATA[currentUnit].practiceA;
    practices.forEach((p, idx) => {
        const ansBox = document.getElementById(`ans-${idx}`);
        if (ansBox) {
            ansBox.style.display = 'block';
            if (!ansBox.innerHTML.trim()) {
                ansBox.innerHTML = `
                    <strong>Ответ:</strong> ${p.ans ? '✅ Right' : '❌ Wrong'}
                    ${!p.ans ? `<br><strong>Правильный вариант:</strong> <span class="correct">${p.fix}</span>` : ''}
                    <div style="margin-top:8px; font-size:0.85em; color:var(--text-light);">📖 См. правило ${p.ref}</div>
                `;
            }
        }
    });
}

function resetUnitAnswers() {
    if (!confirm('Сбросить все ответы Unit ' + currentUnit + '?')) return;
    Object.keys(userAnswers).forEach(k => {
        if (k.startsWith(`${currentUnit}_`)) delete userAnswers[k];
    });
    stats[currentUnit] = {correct: 0, wrong: 0};
    localStorage.setItem('trainer_answers', JSON.stringify(userAnswers));
    localStorage.setItem('trainer_stats', JSON.stringify(stats));
    renderContent();
}

// ==================== PRACTICE B ====================
function renderPracticeB(area) {
    const p = DATA[currentUnit].practiceB;
    if (!p) {
        area.innerHTML = `<div class="card">Practice B для этого юнита недоступен.</div>`;
        return;
    }
    
    let textHtml = p.text.replace(/\((\d+)\) ___/g, (match, num) => {
        const savedKey = `${currentUnit}_B_${num}`;
        const savedVal = userAnswers[savedKey] || '';
        return `<input type="text" class="fill-blank" id="blank-${num}" data-ans="${p.answers[num-1]}" data-num="${num}" value="${savedVal}" placeholder="(${num})">`;
    });
    
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
        <div style="line-height: 2.5; font-size: 1.05em;">${textHtml}</div>
        <div style="margin-top:25px; text-align:right;">
            <button class="btn btn-primary" onclick="checkB()">✓ Проверить ответы</button>
            <button class="btn btn-warning" onclick="showAllB()">👁️ Показать все</button>
            <button class="btn btn-wrong" onclick="resetB()">🔄 Сбросить</button>
        </div>
    `;
    area.appendChild(card);
    
    document.querySelectorAll('.fill-blank').forEach(inp => {
        inp.addEventListener('input', (e) => {
            const num = e.target.dataset.num;
            userAnswers[`${currentUnit}_B_${num}`] = e.target.value;
            localStorage.setItem('trainer_answers', JSON.stringify(userAnswers));
        });
    });
}

function checkB() {
    const inputs = document.querySelectorAll('.fill-blank');
    let score = 0;
    let total = inputs.length;
    inputs.forEach(inp => {
        const userVal = inp.value.trim().toLowerCase();
        const correctVal = inp.dataset.ans.toLowerCase();
        inp.classList.remove('correct', 'wrong');
        
        const correctOptions = correctVal.split('/').map(s => s.trim());
        const isCorrect = correctOptions.includes(userVal);
        
        if (isCorrect) {
            inp.classList.add('correct');
            score++;
        } else {
            inp.classList.add('wrong');
            inp.title = `Правильный ответ: ${inp.dataset.ans}`;
        }
    });
    alert(`Ваш результат: ${score} из ${total} (${Math.round(score/total*100)}%)`);
}

function showAllB() {
    document.querySelectorAll('.fill-blank').forEach(inp => {
        inp.value = inp.dataset.ans;
        inp.classList.remove('wrong');
        inp.classList.add('correct');
    });
}

function resetB() {
    if (!confirm('Сбросить все ответы?')) return;
    document.querySelectorAll('.fill-blank').forEach(inp => {
        inp.value = '';
        inp.classList.remove('correct', 'wrong');
        delete userAnswers[`${currentUnit}_B_${inp.dataset.num}`];
    });
    localStorage.setItem('trainer_answers', JSON.stringify(userAnswers));
}

// ==================== RANDOM TEST ====================
function renderRandomTest(area) {
    let allQuestions = [];
    for (let u = 1; u <= 5; u++) {
        DATA[u].practiceA.forEach((p, idx) => {
            allQuestions.push({...p, unit: u, origIdx: idx});
        });
    }
    
    allQuestions = allQuestions.sort(() => Math.random() - 0.5).slice(0, 15);
    
    area.innerHTML = `
        <div class="card">
            <h3 style="font-family:'Cormorant Garamond',serif; color:var(--deep); font-size:1.6em; margin-bottom:10px;">🎲 Случайный тест из всех юнитов</h3>
            <p style="color:var(--text-light);">Определите, верны ли следующие предложения. Если нет — исправьте ошибку.</p>
        </div>
    `;
    
    allQuestions.forEach((p, idx) => {
        const item = document.createElement('div');
        item.className = 'practice-a-item';
        item.innerHTML = `
            <div style="margin-bottom:12px;"><strong style="color:var(--deep);">[Unit ${p.unit}]</strong> ${idx + 1}. ${p.s}</div>
            <button class="btn btn-right" onclick="checkRandom(this, true, ${p.ans}, '${p.fix.replace(/'/g, "\\'")}', ${p.unit})">✅ Right</button>
            <button class="btn btn-wrong" onclick="checkRandom(this, false, ${p.ans}, '${p.fix.replace(/'/g, "\\'")}', ${p.unit})">❌ Wrong</button>
            <div class="answer-box"></div>
        `;
        area.appendChild(item);
    });
}

function checkRandom(btn, userAns, correctAns, fix, unit) {
    const item = btn.parentElement;
    const ansBox = item.querySelector('.answer-box');
    const isCorrect = (userAns === correctAns);
    
    let html = '';
    if (isCorrect) {
        html = `<span style="color:var(--success); font-weight:600;">🎉 Верно!</span>`;
        item.classList.add('answered-correct');
    } else {
        html = `<span style="color:var(--danger); font-weight:600;">❌ Ошибка.</span><br>`;
        item.classList.add('answered-wrong');
    }
    
    if (!correctAns && fix) {
        html += `<strong>Правильный вариант:</strong> <span class="correct">${fix}</span>`;
    }
    
    ansBox.innerHTML = html;
    ansBox.style.display = 'block';
    btn.parentElement.querySelectorAll('button').forEach(b => b.disabled = true);
    
    if (!stats['random']) stats['random'] = {correct: 0, wrong: 0};
    if (isCorrect) stats['random'].correct++;
    else stats['random'].wrong++;
    localStorage.setItem('trainer_stats', JSON.stringify(stats));
    updateStats();
}

// ==================== STATS ====================
function updateStats() {
    const statsArea = document.getElementById('stats-area');
    if (currentMode === 'randomTest') {
        const s = stats['random'] || {correct: 0, wrong: 0};
        const total = s.correct + s.wrong;
        const pct = total ? Math.round(s.correct / total * 100) : 0;
        statsArea.innerHTML = `
            <div class="stat-box"><div class="label">✅ Верно</div><div class="value" style="color:var(--success);">${s.correct}</div></div>
            <div class="stat-box"><div class="label">❌ Ошибки</div><div class="value" style="color:var(--danger);">${s.wrong}</div></div>
            <div class="stat-box"><div class="label">📊 Точность</div><div class="value">${pct}%</div></div>
        `;
        return;
    }
    
    if (currentMode !== 'practiceA' && currentMode !== 'practiceB') {
        statsArea.innerHTML = '';
        return;
    }
    
    const s = stats[currentUnit] || {correct: 0, wrong: 0};
    const total = s.correct + s.wrong;
    const pct = total ? Math.round(s.correct / total * 100) : 0;
    const totalQuestions = DATA[currentUnit].practiceA ? DATA[currentUnit].practiceA.length : 0;
    
    statsArea.innerHTML = `
        <div class="stat-box"><div class="label">✅ Верно</div><div class="value" style="color:var(--success);">${s.correct}</div></div>
        <div class="stat-box"><div class="label">❌ Ошибки</div><div class="value" style="color:var(--danger);">${s.wrong}</div></div>
        <div class="stat-box"><div class="label">📊 Точность</div><div class="value">${pct}%</div></div>
        <div class="stat-box"><div class="label">📝 Всего вопросов</div><div class="value">${totalQuestions}</div></div>
    `;
    
    if (total > 0) {
        statsArea.innerHTML += `
            <div style="width:100%;">
                <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
            </div>
        `;
    }
}

// ==================== EXPORT/IMPORT ====================
function exportProgress() {
    const data = {
        stats: stats,
        userAnswers: userAnswers,
        images: {},
        exportDate: new Date().toISOString()
    };
    for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key.startsWith('img_')) {
            data.images[key] = localStorage.getItem(key);
        }
    }
    const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `trainer_progress_${new Date().toISOString().split('T')[0]}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('💾 Прогресс экспортирован!');
}

function importProgress(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const data = JSON.parse(e.target.result);
            if (data.stats) {
                stats = data.stats;
                localStorage.setItem('trainer_stats', JSON.stringify(stats));
            }
            if (data.userAnswers) {
                userAnswers = data.userAnswers;
                localStorage.setItem('trainer_answers', JSON.stringify(userAnswers));
            }
            if (data.images) {
                Object.keys(data.images).forEach(k => {
                    localStorage.setItem(k, data.images[k]);
                });
            }
            showToast('✅ Прогресс успешно импортирован!');
            renderContent();
        } catch (err) {
            showToast('❌ Ошибка импорта: ' + err.message, true);
        }
    };
    reader.readAsText(file);
}

function resetProgress() {
    if (!confirm('Удалить ВСЁ: прогресс, ответы и картинки?')) return;
    if (!confirm('Вы уверены? Все данные будут потеряны!')) return;
    localStorage.clear();
    stats = {};
    userAnswers = {};
    showToast('✅ Прогресс сброшен.');
    setTimeout(() => location.reload(), 1000);
}

// Start
init();
</script>
