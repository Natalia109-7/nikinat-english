<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тренажёр английской лексики — 96 тем</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b7a9e;
            --primary-light: #f0e8f5;
            --accent: #d4a5b5;
            --success: #9cb8a5;
            --error: #c9a8a8;
            --text-main: #5a4a5a;
            --text-sec: #8b7a8b;
            --bg: #faf6f8;
            --card-bg: #ffffff;
            --border: #e8dce8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.6;
        }

        .header {
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo { 
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px; 
            font-weight: 600; 
            color: var(--primary);
            font-style: italic;
        }
        .logo span { color: var(--text-main); font-style: normal; }
        .user-info { font-size: 14px; color: var(--text-sec); }

        .container {
            display: flex;
            max-width: 1400px;
            margin: 30px auto;
            gap: 30px;
            padding: 0 20px;
        }

        .sidebar {
            width: 320px;
            flex-shrink: 0;
            max-height: calc(100vh - 120px);
            overflow-y: auto;
            position: sticky;
            top: 100px;
        }
        .sidebar-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(139, 122, 158, 0.08);
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }
        .sidebar-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 18px;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 16px;
            letter-spacing: 0.5px;
        }
        .progress-bar-bg {
            height: 6px;
            background: var(--primary-light);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 8px;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            width: 0%;
            transition: width 0.5s ease;
        }
        .progress-text { font-size: 13px; color: var(--text-sec); }
        
        .topic-list { list-style: none; }
        .topic-item {
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            color: var(--text-main);
        }
        .topic-item:hover { background: var(--primary-light); }
        .topic-item.active { 
            background: var(--primary); 
            color: white; 
            font-weight: 500; 
        }
        .topic-item.completed { color: var(--success); }
        .topic-item.completed::after { content: "✓"; font-weight: 600; }

        .main-content {
            flex: 1;
            background: var(--card-bg);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 2px 8px rgba(139, 122, 158, 0.08);
            min-height: 600px;
            border: 1px solid var(--border);
        }

        .theory-box {
            background: linear-gradient(135deg, var(--primary-light) 0%, #f5f0f8 100%);
            border-left: 4px solid var(--primary);
            border-radius: 12px;
            padding: 28px;
            margin-bottom: 32px;
        }
        .theory-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 24px;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 20px;
        }
        .words-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 16px;
            margin-top: 16px;
        }
        .word-item {
            background: white;
            padding: 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        .word-en {
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 6px;
            font-size: 15px;
        }
        .word-ru {
            color: var(--text-sec);
            font-size: 14px;
            line-height: 1.5;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 16px;
        }
        .question-tag {
            background: var(--primary-light);
            color: var(--primary);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }
        .question-counter { font-size: 14px; color: var(--text-sec); }

        .question-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 24px;
            color: var(--primary);
        }
        
        .context-sentence {
            font-size: 18px;
            background: var(--bg);
            padding: 20px;
            border-left: 4px solid var(--accent);
            border-radius: 0 8px 8px 0;
            margin-bottom: 24px;
            font-style: italic;
            color: var(--text-main);
        }
        .blank { 
            color: var(--primary); 
            font-weight: 600; 
            border-bottom: 2px dashed var(--primary);
            padding: 0 4px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }
        .option-btn {
            padding: 18px;
            border: 2px solid var(--border);
            border-radius: 10px;
            background: white;
            cursor: pointer;
            font-size: 15px;
            text-align: left;
            transition: all 0.3s;
            font-family: inherit;
            color: var(--text-main);
        }
        .option-btn:hover:not(:disabled) {
            border-color: var(--primary);
            background: var(--primary-light);
        }
        .option-btn.correct {
            border-color: var(--success);
            background: #e8f0e8;
            color: #5a7a5a;
            font-weight: 600;
        }
        .option-btn.wrong {
            border-color: var(--error);
            background: #f0e8e8;
            color: #7a5a5a;
        }
        .option-btn:disabled { cursor: not-allowed; opacity: 0.7; }

        .explanation-box {
            display: none;
            background: linear-gradient(135deg, #fff9f0 0%, #fff5f0 100%);
            border: 1px solid #f5e5d5;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
            font-size: 15px;
            line-height: 1.6;
        }
        .explanation-box.show { display: block; }
        .explanation-box strong { color: var(--primary); }

        .btn-next {
            display: none;
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            box-shadow: 0 4px 12px rgba(139, 122, 158, 0.25);
        }
        .btn-next:hover { 
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(139, 122, 158, 0.3);
        }
        .btn-next.show { display: block; }

        .results-screen { 
            text-align: center; 
            padding: 60px 40px;
            background: linear-gradient(135deg, var(--primary-light) 0%, #f5f0f8 100%);
            border-radius: 16px;
        }
        .results-icon { 
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, var(--success), #b8d4c5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: white;
        }
        .results-score { 
            font-family: 'Cormorant Garamond', serif;
            font-size: 32px; 
            font-weight: 600; 
            color: var(--primary);
            margin-bottom: 16px;
        }
        .results-text {
            color: var(--text-sec);
            margin-bottom: 32px;
            font-size: 16px;
        }
        
        @media (max-width: 768px) {
            .container { flex-direction: column; }
            .sidebar { width: 100%; max-height: none; position: static; }
            .options-grid { grid-template-columns: 1fr; }
            .main-content { padding: 24px; }
            .words-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

        <div class="logo">English <span>Vocabulary</span></div>

    </header>

    <div class="container">
        <aside class="sidebar">
            <div class="sidebar-card">
                <div class="sidebar-title">Прогресс обучения</div>

    <script>
        const quizData = [
            {id:1,title:"1. Job / Occupation / Work / Employment / Profession",words:[{en:"Job",ru:"Конкретная работа, должность"},{en:"Occupation",ru:"Род занятий (формально)"},{en:"Work",ru:"Труд как процесс (неисчисл.)"},{en:"Employment",ru:"Официальное трудоустройство"},{en:"Profession",ru:"Профессия с образованием"}],questions:[{sentence:"She has a _____ as a barista.",correct:0,explanation:"<strong>Job</strong> — конкретная работа или должность."},{sentence:"Her _____ is architect.",correct:1,explanation:"<strong>Occupation</strong> — род занятий (формально)."},{sentence:"He loves his _____.",correct:2,explanation:"<strong>Work</strong> — труд как процесс (неисчисляемое)."},{sentence:"She is looking for _____.",correct:3,explanation:"<strong>Employment</strong> — официальное трудоустройство."},{sentence:"Law is a respected _____.",correct:4,explanation:"<strong>Profession</strong> — профессия с образованием."}]},
            {id:2,title:"2. Task / Course / Duty",words:[{en:"Task",ru:"Задание"},{en:"Course",ru:"Курс обучения"},{en:"Duty",ru:"Обязанность"}],questions:[{sentence:"Finish this _____ before the deadline.",correct:0,explanation:"<strong>Task</strong> — конкретное задание."},{sentence:"She enrolled in an English _____.",correct:1,explanation:"<strong>Course</strong> — курс обучения."},{sentence:"It's my _____ to help.",correct:2,explanation:"<strong>Duty</strong> — обязанность, долг."}]},
            {id:3,title:"3. Employer / Employee / Colleague / Assistant / Clerk / Officer / Attendant",words:[{en:"Employer",ru:"Нанимает"},{en:"Employee",ru:"Работник"},{en:"Colleague",ru:"Коллега"},{en:"Assistant",ru:"Помощник"},{en:"Clerk",ru:"Офисный служащий"},{en:"Officer",ru:"Офицер/госслужащий"},{en:"Attendant",ru:"Обслуживающий персонал"}],questions:[{sentence:"My _____ is very fair.",correct:0,explanation:"<strong>Employer</strong> — наниматель, работодатель."},{sentence:"She was named _____ of the month.",correct:1,explanation:"<strong>Employee</strong> — работник, сотрудник."},{sentence:"My _____ helped me with the project.",correct:2,explanation:"<strong>Colleague</strong> — коллега."},{sentence:"She works as a personal _____.",correct:3,explanation:"<strong>Assistant</strong> — помощник."},{sentence:"He works as a bank _____.",correct:4,explanation:"<strong>Clerk</strong> — офисный служащий."},{sentence:"He is a customs _____.",correct:5,explanation:"<strong>Officer</strong> — офицер/госслужащий."},{sentence:"The parking _____ directed us.",correct:6,explanation:"<strong>Attendant</strong> — обслуживающий персонал."}]},
            {id:4,title:"4. Party / Crew / Staff",words:[{en:"Party",ru:"Группа (делегация)"},{en:"Crew",ru:"Команда (экипаж)"},{en:"Staff",ru:"Персонал компании"}],questions:[{sentence:"The tour _____ visited the museum.",correct:0,explanation:"<strong>Party</strong> — группа (делегация)."},{sentence:"The film _____ worked tirelessly.",correct:1,explanation:"<strong>Crew</strong> — команда (экипаж)."},{sentence:"All _____ members are present.",correct:2,explanation:"<strong>Staff</strong> — персонал компании."}]},
            {id:5,title:"5. Aim / Goal / Intention / Challenge / Success / Ambition",words:[{en:"Aim",ru:"Общая цель"},{en:"Goal",ru:"Конкретная цель"},{en:"Intention",ru:"Намерение"},{en:"Challenge",ru:"Вызов"},{en:"Success",ru:"Результат"},{en:"Ambition",ru:"Грандиозная мечта"}],questions:[{sentence:"Our _____ is to achieve peace.",correct:0,explanation:"<strong>Aim</strong> — общая цель."},{sentence:"Her _____ is to lose 5 kg.",correct:1,explanation:"<strong>Goal</strong> — конкретная цель."},{sentence:"I have no _____ to leave.",correct:2,explanation:"<strong>Intention</strong> — намерение."},{sentence:"Math is a real _____ for me.",correct:3,explanation:"<strong>Challenge</strong> — вызов, сложная задача."},{sentence:"The project was a great _____.",correct:4,explanation:"<strong>Success</strong> — результат, успех."},{sentence:"Her _____ is to become famous.",correct:5,explanation:"<strong>Ambition</strong> — грандиозная мечта."}]},
            {id:6,title:"6. Achieve / Fulfil / Cope / Deal / Face / Succeed",words:[{en:"Achieve",ru:"Достичь цели"},{en:"Fulfil",ru:"Выполнить (обязанность)"},{en:"Cope",ru:"Справляться"},{en:"Deal",ru:"Решать"},{en:"Face",ru:"Столкнуться"},{en:"Succeed",ru:"Преуспеть"}],questions:[{sentence:"She managed to _____ her dreams.",correct:0,explanation:"<strong>Achieve</strong> — достичь цели."},{sentence:"He promised to _____ his promise.",correct:1,explanation:"<strong>Fulfil</strong> — выполнить (обещание, обязанность)."},{sentence:"She learned to _____ with stress.",correct:2,explanation:"<strong>Cope (with)</strong> — справляться."},{sentence:"He knows how to _____ with clients.",correct:3,explanation:"<strong>Deal (with)</strong> — решать, иметь дело."},{sentence:"You must _____ the consequences.",correct:4,explanation:"<strong>Face</strong> — столкнуться."},{sentence:"She managed to _____ in her exams.",correct:5,explanation:"<strong>Succeed (in)</strong> — преуспеть."}]},
            {id:7,title:"7. Manage / Run / Operate / Undertake",words:[{en:"Manage",ru:"Управлять (формально)"},{en:"Run",ru:"Вести (неформ.)"},{en:"Operate",ru:"Управлять техникой"},{en:"Undertake",ru:"Предпринять"}],questions:[{sentence:"She knows how to _____ a project.",correct:0,explanation:"<strong>Manage</strong> — управлять (формально)."},{sentence:"He decided to _____ a shop.",correct:1,explanation:"<strong>Run</strong> — вести (неформально)."},{sentence:"He knows how to _____ a machine.",correct:2,explanation:"<strong>Operate</strong> — управлять техникой."},{sentence:"They decided to _____ the risks.",correct:3,explanation:"<strong>Undertake</strong> — предпринять."}]},
            {id:8,title:"8. Skills / Qualities / Qualifications / Experience",words:[{en:"Skills",ru:"Навыки"},{en:"Qualities",ru:"Черты характера"},{en:"Qualifications",ru:"Дипломы/сертификаты"},{en:"Experience",ru:"Опыт (неисч.)"}],questions:[{sentence:"She has excellent communication _____.",correct:0,explanation:"<strong>Skills</strong> — навыки."},{sentence:"Leadership _____ are important.",correct:1,explanation:"<strong>Qualities</strong> — черты характера."},{sentence:"The job requires specific _____.",correct:2,explanation:"<strong>Qualifications</strong> — дипломы/сертификаты."},{sentence:"He has 10 years' _____.",correct:3,explanation:"<strong>Experience</strong> — опыт (неисчисляемое)."}]},
            {id:9,title:"9. Look / See / Watch / Notice / Regard / Stare / Glance / Observe",words:[{en:"Look",ru:"Смотреть (намеренно)"},{en:"See",ru:"Видеть (пассивно)"},{en:"Watch",ru:"Наблюдать (движение)"},{en:"Notice",ru:"Заметить"},{en:"Regard",ru:"Рассматривать как"},{en:"Stare",ru:"Пялиться"},{en:"Glance",ru:"Взглянуть мельком"},{en:"Observe",ru:"Наблюдать (внимательно)"}],questions:[{sentence:"_____ at me when I'm talking!",correct:0,explanation:"<strong>Look</strong> — смотреть намеренно."},{sentence:"I _____ a bird in the tree.",correct:1,explanation:"<strong>See</strong> — видеть (пассивно)."},{sentence:"Let's _____ a film tonight.",correct:2,explanation:"<strong>Watch</strong> — наблюдать (движение)."},{sentence:"Did you _____ the change?",correct:3,explanation:"<strong>Notice</strong> — заметить."},{sentence:"He is _____ as a smart person.",correct:4,explanation:"<strong>Regard</strong> — рассматривать как."},{sentence:"Don't _____ at people!",correct:5,explanation:"<strong>Stare</strong> — пялиться."},{sentence:"She took a _____ at the clock.",correct:6,explanation:"<strong>Glance</strong> — взглянуть мельком."},{sentence:"Scientists _____ the behavior.",correct:7,explanation:"<strong>Observe</strong> — наблюдать (внимательно)."}]},

            {id:14,title:"14. Memorise / Remind / Recall / Recognise",words:[{en:"Memorise",ru:"Заучить"},{en:"Remind",ru:"Напомнить"},{en:"Recall",ru:"Вспомнить"},{en:"Recognise",ru:"Узнать"}],questions:[{sentence:"I need to _____ a poem.",correct:0,explanation:"<strong>Memorise</strong> — заучить."},{sentence:"This song _____ me of you.",correct:1,explanation:"<strong>Remind</strong> — напомнить."},{sentence:"I _____ your face from somewhere.",correct:2,explanation:"<strong>Recall</strong> — вспомнить."},{sentence:"I _____ her voice immediately.",correct:3,explanation:"<strong>Recognise</strong> — узнать."}]},

            {id:90,title:"90. Allow / Let / Permit / Accept / Make / Oblige / Force",words:[{en:"Allow",ru:"Разрешать"},{en:"Let",ru:"Позволить (разг.)"},{en:"Permit",ru:"Разрешать (форм.)"},{en:"Accept",ru:"Принимать"},{en:"Make",ru:"Заставлять"},{en:"Oblige",ru:"Обязывать"},{en:"Force",ru:"Заставлять"}],questions:[{sentence:"_____ smoking.",correct:0,explanation:"<strong>Allow</strong> — разрешать."},{sentence:"_____ me go.",correct:1,explanation:"<strong>Let</strong> — позволить (разговорно)."},{sentence:"_____ entry.",correct:2,explanation:"<strong>Permit</strong> — разрешать (формально)."},{sentence:"_____ an offer.",correct:3,explanation:"<strong>Accept</strong> — принимать."},{sentence:"_____ him leave.",correct:4,explanation:"<strong>Make</strong> — заставлять."},{sentence:"Law _____ you.",correct:5,explanation:"<strong>Obliges</strong> — обязывать."},{sentence:"_____ to resign.",correct:6,explanation:"<strong>Forced</strong> — заставлять."}]},
            {id:91,title:"91. Postpone / Cancel / Delay",words:[{en:"Postpone",ru:"Откладывать (на другое время)"},{en:"Cancel",ru:"Отменять"},{en:"Delay",ru:"Задерживать"}],questions:[{sentence:"_____ the meeting.",correct:0,explanation:"<strong>Postpone</strong> — откладывать (на другое время)."},{sentence:"_____ the flight.",correct:1,explanation:"<strong>Cancel</strong> — отменять."},{sentence:"_____ the launch.",correct:2,explanation:"<strong>Delay</strong> — задерживать (не обязательно отменять)."}]},
            {id:92,title:"92. Guest / Host / Visitor / Client / Customer",words:[{en:"Guest",ru:"Гость (частный/в отеле)"},{en:"Host",ru:"Принимающая сторона"},{en:"Visitor",ru:"Посетитель"},{en:"Client",ru:"Клиент (услуги)"},{en:"Customer",ru:"Покупатель"}],questions:[{sentence:"Hotel _____.",correct:0,explanation:"<strong>Guest</strong> — гость (частный/в отеле)."},{sentence:"TV show _____.",correct:1,explanation:"<strong>Host</strong> — принимающая сторона."},{sentence:"Museum _____.",correct:2,explanation:"<strong>Visitor</strong> — посетитель."},{sentence:"Legal _____.",correct:3,explanation:"<strong>Client</strong> — клиент (услуги)."},{sentence:"Supermarket _____.",correct:4,explanation:"<strong>Customer</strong> — покупатель."}]},
            {id:93,title:"93. Like / Alike / Unlike / Likely / As / Same / Similar / Common",words:[{en:"Like",ru:"Как/подобный (предлог/сущ.)"},{en:"Alike",ru:"Похожие между собой"},{en:"Unlike",ru:"В отличие от"},{en:"Likely",ru:"Вероятный"},{en:"As",ru:"Как (в сравнениях)"},{en:"Same",ru:"Тот же самый"},{en:"Similar",ru:"Схожий"},{en:"Common",ru:"Общий/распространённый"}],questions:[{sentence:"She looks _____ her mom.",correct:0,explanation:"<strong>Like</strong> — как/подобный (предлог/существительное)."},{sentence:"They are _____.",correct:1,explanation:"<strong>Alike</strong> — похожие между собой."},{sentence:"_____ me, he's tall.",correct:2,explanation:"<strong>Unlike</strong> — в отличие от."},{sentence:"It's _____ to rain.",correct:3,explanation:"<strong>Likely</strong> — вероятный."},{sentence:"Work _____ a teacher.",correct:4,explanation:"<strong>As</strong> — как (в сравнениях)."},{sentence:"The _____ book.",correct:5,explanation:"<strong>Same</strong> — тот же самый."},{sentence:"_____ ideas.",correct:6,explanation:"<strong>Similar</strong> — схожий."},{sentence:"_____ mistake.",correct:7,explanation:"<strong>Common</strong> — общий/распространённый."}]},
            {id:94,title:"94. Suit / Fit / Match / Combine / Compare",words:[{en:"Suit",ru:"Идти (о цвете/стиле)"},{en:"Fit",ru:"Подходить по размеру"},{en:"Match",ru:"Сочетаться (цвет/стиль)"},{en:"Combine",ru:"Сочетать"},{en:"Compare",ru:"Сравнивать"}],questions:[{sentence:"This shirt _____ you.",correct:0,explanation:"<strong>Suits</strong> — идти (о цвете/стиле)."},{sentence:"Shoes _____ well.",correct:1,explanation:"<strong>Fit</strong> — подходить по размеру."},{sentence:"Tie _____ suit.",correct:2,explanation:"<strong>Matches</strong> — сочетаться (цвет/стиль)."},{sentence:"_____ colors.",correct:3,explanation:"<strong>Combine</strong> — сочетать."},{sentence:"_____ prices.",correct:4,explanation:"<strong>Compare</strong> — сравнивать."}]},
            {id:95,title:"95. Punctual / Accurate / Correct / Exact / Sharp",words:[{en:"Punctual",ru:"Пунктуальный"},{en:"Accurate",ru:"Точный (измерения)"},{en:"Correct",ru:"Правильный (ответ)"},{en:"Exact",ru:"Точный (значение/время)"},{en:"Sharp",ru:"Ровно (о времени)"}],questions:[{sentence:"Always _____.",correct:0,explanation:"<strong>Punctual</strong> — пунктуальный."},{sentence:"_____ data.",correct:1,explanation:"<strong>Accurate</strong> — точный (измерения)."},{sentence:"_____ answer.",correct:2,explanation:"<strong>Correct</strong> — правильный (ответ)."},{sentence:"_____ time.",correct:3,explanation:"<strong>Exact</strong> — точный (значение/время)."},{sentence:"9 a.m. _____.",correct:4,explanation:"<strong>Sharp</strong> — ровно (о времени)."}]},
            {id:96,title:"96. Stand / Resist / Tolerate / Suffer",words:[{en:"Stand",ru:"Выносить (разг.)"},{en:"Resist",ru:"Сопротивляться"},{en:"Tolerate",ru:"Терпеть (форм.)"},{en:"Suffer",ru:"Страдать"}],questions:[{sentence:"I can't _____ noise.",correct:0,explanation:"<strong>Stand</strong> — выносить (разговорно)."},{sentence:"_____ temptation.",correct:1,explanation:"<strong>Resist</strong> — сопротивляться."},{sentence:"_____ differences.",correct:2,explanation:"<strong>Tolerate</strong> — терпеть (формально)."},{sentence:"_____ from pain.",correct:3,explanation:"<strong>Suffer</strong> — страдать."}]}
        ];

        let currentTopicIndex = 0;
        let currentQuestionIndex = 0;
        let score = 0;
        let completedTopics = new Set();

        const mainContent = document.getElementById('mainContent');
        const topicList = document.getElementById('topicList');
        const globalProgress = document.getElementById('globalProgress');
        const globalProgressText = document.getElementById('globalProgressText');

        function init() {
            renderSidebar();
            loadTopic(0);
        }

        function renderSidebar() {
            topicList.innerHTML = '';
            quizData.forEach((topic, index) => {
                const li = document.createElement('li');
                li.className = 'topic-item';
                if (index === currentTopicIndex) li.classList.add('active');
                if (completedTopics.has(topic.id)) li.classList.add('completed');
                
                li.innerHTML = `<span>${topic.title}</span>`;
                li.onclick = () => {
                    currentTopicIndex = index;
                    currentQuestionIndex = 0;
                    renderSidebar();
                    loadTopic(index);
                };
                topicList.appendChild(li);
            });
            
            updateGlobalProgress();
        }

        function updateGlobalProgress() {
            const percent = (completedTopics.size / quizData.length) * 100;
            globalProgress.style.width = `${percent}%`;
            globalProgressText.textContent = `${completedTopics.size} из ${quizData.length} тем пройдено`;
        }

        function loadTopic(index) {
            const topic = quizData[index];
            if (currentQuestionIndex >= topic.questions.length) {
                showTopicResults(topic);
                return;
            }

            let theoryHtml = '';
            if (currentQuestionIndex === 0) {
                theoryHtml = `
                    <div class="theory-box">
                        <div class="theory-title">Теория: ${topic.title}</div>
                        <div class="words-grid">
                            ${topic.words.map(word => `
                                <div class="word-item">
                                    <div class="word-en">${word.en}</div>
                                    <div class="word-ru">${word.ru}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            const q = topic.questions[currentQuestionIndex];
            const sentenceHtml = q.sentence.replace('_____', '<span class="blank">......</span>');
            
            let html = theoryHtml + `
                <div class="question-header">
                    <span class="question-tag">${topic.title}</span>
                    <span class="question-counter">Вопрос ${currentQuestionIndex + 1} из ${topic.questions.length}</span>
                </div>
                <div class="question-text">Выберите правильное слово:</div>
                <div class="context-sentence">${sentenceHtml}</div>
                <div class="options-grid" id="optionsGrid">
                    ${topic.words.map((word, i) => `
                        <button class="option-btn" onclick="checkAnswer(${i})">${word.en.split('/')[0].trim()}</button>
                    `).join('')}
                </div>
                <div class="explanation-box" id="explanationBox">
                    ${q.explanation}
                </div>
                <button class="btn-next" id="btnNext" onclick="nextQuestion()">
                    ${currentQuestionIndex + 1 === topic.questions.length ? 'Завершить тему' : 'Следующий вопрос'}
                </button>
            `;

            mainContent.innerHTML = html;
            mainContent.scrollTop = 0;
        }

        function checkAnswer(selectedIndex) {
            const topic = quizData[currentTopicIndex];
            const q = topic.questions[currentQuestionIndex];
            const buttons = document.querySelectorAll('.option-btn');
            
            buttons.forEach((btn, i) => {
                btn.disabled = true;
                if (i === q.correct) btn.classList.add('correct');
                if (i === selectedIndex && i !== q.correct) btn.classList.add('wrong');
            });

            if (selectedIndex === q.correct) score++;

            document.getElementById('explanationBox').classList.add('show');
            document.getElementById('btnNext').classList.add('show');
        }

        function nextQuestion() {
            currentQuestionIndex++;
            const topic = quizData[currentTopicIndex];
            
            if (currentQuestionIndex >= topic.questions.length) {
                completedTopics.add(topic.id);
                renderSidebar();
                showTopicResults(topic);
            } else {
                loadTopic(currentTopicIndex);
            }
        }

        function showTopicResults(topic) {
            mainContent.innerHTML = `
                <div class="results-screen">
                    <div class="results-icon">✓</div>
                    <div class="results-score">Тема завершена!</div>
                    <p class="results-text">Вы успешно завершили тему «${topic.title}». Переходите к следующей теме или вернитесь к пройденным для повторения.</p>
                    <button class="btn-next show" style="max-width: 300px; margin: 0 auto;" onclick="goToNextTopic()">
                        ${currentTopicIndex + 1 < quizData.length ? 'Следующая тема' : 'В начало'}
                    </button>
                </div>
            `;
        }

        function goToNextTopic() {
            if (currentTopicIndex + 1 < quizData.length) {
                currentTopicIndex++;
                currentQuestionIndex = 0;
                renderSidebar();
                loadTopic(currentTopicIndex);
            } else {
                currentTopicIndex = 0;
                currentQuestionIndex = 0;
                renderSidebar();
                loadTopic(0);
            }
        }

        init();
    </script>
