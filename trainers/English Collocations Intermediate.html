<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Collocations · Natalie English</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --lavender: #e8dff5;
  --peach: #fce4d6;
  --mint: #d4f1e8;
  --rose: #f7d6e0;
  --cream: #fdf6f0;
  --deep: #5a4a7a;
  --soft: #8b7ba8;
  --text: #3d3554;
  --text-light: #8b7ba8;
  --success: #6ba889;
  --danger: #c97b84;
  --warning: #d4a574;
  --shadow: 0 10px 40px rgba(138,107,175,0.15);
  --radius: 24px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Montserrat', sans-serif;
  background: linear-gradient(135deg, var(--cream) 0%, var(--lavender) 50%, var(--peach) 100%);
  background-attachment: fixed;
  min-height: 100vh;
  padding: 20px;
  color: var(--text);
  overflow-x: hidden;
}

.blob {
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.4;
  z-index: -1;
  pointer-events: none;
  animation: float 20s infinite ease-in-out;
}
.blob1 { width: 400px; height: 400px; background: var(--rose); top: -100px; left: -100px; }
.blob2 { width: 500px; height: 500px; background: var(--mint); bottom: -150px; right: -150px; animation-delay: -10s; }
.blob3 { width: 300px; height: 300px; background: var(--lavender); top: 50%; left: 50%; animation-delay: -5s; }

@keyframes float {
  0%, 100% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(50px, -50px) scale(1.1); }
  66% { transform: translate(-30px, 40px) scale(0.95); }
}

.top-nav {
  max-width: 1100px;
  margin: 0 auto 25px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 25px;
  background: rgba(253,246,240,0.7);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 40px;
  border: 1px solid rgba(255,255,255,0.5);
  box-shadow: var(--shadow);
}

.logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 600;
  color: var(--deep);
  letter-spacing: 1px;
}
.logo span { color: var(--soft); font-style: italic; }

.back-btn {
  padding: 10px 22px;
  background: linear-gradient(135deg, var(--deep), var(--soft));
  color: white;
  text-decoration: none;
  border-radius: 30px;
  font-size: 13px;
  font-weight: 500;
  box-shadow: 0 6px 20px rgba(90,74,122,0.25);
  transition: all 0.3s;
  cursor: pointer;
  border: none;
  font-family: 'Montserrat', sans-serif;
}
.back-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(90,74,122,0.35); }

.container {
  max-width: 1100px;
  margin: 0 auto;
}

header {
  background: linear-gradient(135deg, var(--lavender) 0%, var(--rose) 50%, var(--peach) 100%);
  color: var(--deep);
  padding: 40px 30px;
  text-align: center;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  margin-bottom: 25px;
  position: relative;
  overflow: hidden;
}

header h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2.5em;
  font-weight: 500;
  margin-bottom: 10px;
  letter-spacing: 0.5px;
}

header p {
  color: var(--soft);
  font-size: 1.05em;
  font-style: italic;
}

.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 25px;
}

.stat-item {
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  padding: 18px;
  border-radius: 20px;
  text-align: center;
  border: 1px solid rgba(255,255,255,0.8);
  box-shadow: var(--shadow);
  transition: all 0.3s;
}

.stat-item:hover {
  transform: translateY(-3px);
  box-shadow: 0 15px 45px rgba(138,107,175,0.2);
}

.stat-value {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2em;
  font-weight: 600;
  color: var(--deep);
  line-height: 1;
}

.stat-label {
  font-size: 0.75em;
  color: var(--text-light);
  margin-top: 6px;
  text-transform: uppercase;
  letter-spacing: 1px;
  font-weight: 500;
}

.content {
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: var(--radius);
  padding: 35px;
  box-shadow: var(--shadow);
  border: 1px solid rgba(255,255,255,0.8);
  min-height: 500px;
}

.mode-selector {
  display: flex;
  gap: 10px;
  margin-bottom: 25px;
  flex-wrap: wrap;
  justify-content: center;
}

.mode-btn {
  flex: 1;
  min-width: 150px;
  padding: 13px 20px;
  background: rgba(255,255,255,0.6);
  border: 1px solid rgba(232,223,245,0.8);
  border-radius: 30px;
  cursor: pointer;
  font-size: 0.95em;
  font-weight: 500;
  color: var(--text);
  font-family: 'Montserrat', sans-serif;
  transition: all 0.3s;
  letter-spacing: 0.3px;
}

.mode-btn:hover {
  background: linear-gradient(135deg, var(--lavender), var(--rose));
  transform: translateY(-2px);
  box-shadow: 0 6px 18px rgba(138,107,175,0.2);
}

.mode-btn.active {
  background: linear-gradient(135deg, var(--deep), var(--soft));
  color: white;
  border-color: transparent;
  box-shadow: 0 6px 20px rgba(90,74,122,0.3);
}

#unitSelection h2 {
  font-family: 'Cormorant Garamond', serif;
  color: var(--deep);
  margin-bottom: 20px;
  font-size: 1.8em;
  font-weight: 500;
  text-align: center;
}

.unit-selector {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 15px;
  max-height: 60vh;
  overflow-y: auto;
  padding: 10px;
}

.unit-btn {
  padding: 20px;
  background: linear-gradient(135deg, rgba(255,255,255,0.8), rgba(252,228,214,0.4));
  border: 1px solid rgba(232,223,245,0.8);
  border-radius: 20px;
  cursor: pointer;
  text-align: left;
  transition: all 0.3s;
  font-family: 'Montserrat', sans-serif;
  color: var(--text);
}

.unit-btn:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 30px rgba(138,107,175,0.2);
  border-color: var(--soft);
}

.unit-btn strong {
  color: var(--deep);
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.2em;
  font-weight: 600;
  display: block;
  margin-bottom: 6px;
}

.unit-btn small {
  color: var(--text-light);
  font-style: italic;
  font-size: 0.9em;
}

.hidden { display: none !important; }

.theory-section {
  animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}

.theory-title, .exercise-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.8em;
  font-weight: 500;
  color: var(--deep);
  margin-bottom: 25px;
  padding-bottom: 15px;
  border-bottom: 2px solid var(--lavender);
}

.collocation-card {
  background: linear-gradient(135deg, rgba(255,255,255,0.8), rgba(252,228,214,0.3));
  padding: 20px;
  margin-bottom: 15px;
  border-radius: 18px;
  border-left: 4px solid var(--soft);
  transition: all 0.3s;
  box-shadow: 0 4px 15px rgba(138,107,175,0.08);
}

.collocation-card:hover {
  transform: translateX(5px);
  box-shadow: 0 8px 25px rgba(138,107,175,0.15);
}

.collocation-en {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.4em;
  font-weight: 600;
  color: var(--deep);
  margin-bottom: 8px;
}

.collocation-ru {
  color: var(--text);
  margin-bottom: 10px;
  font-style: italic;
}

.collocation-example, .exercise-sentence {
  background: rgba(232,223,245,0.3);
  padding: 12px 16px;
  border-radius: 12px;
  color: var(--text);
  font-size: 0.95em;
  border-left: 3px solid var(--soft);
  font-style: italic;
}

.exercise-sentence {
  margin-bottom: 15px;
  font-weight: 500;
}

.navigation {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  margin-top: 30px;
  flex-wrap: wrap;
}

.nav-btn {
  padding: 12px 24px;
  background: linear-gradient(135deg, var(--deep), var(--soft));
  color: white;
  border: none;
  border-radius: 30px;
  cursor: pointer;
  font-size: 0.95em;
  font-weight: 500;
  font-family: 'Montserrat', sans-serif;
  transition: all 0.3s;
  box-shadow: 0 6px 18px rgba(90,74,122,0.25);
}

.nav-btn:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 10px 25px rgba(90,74,122,0.35);
}

.nav-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  background: var(--lavender);
  box-shadow: none;
}

.question {
  background: linear-gradient(135deg, rgba(255,255,255,0.8), rgba(253,246,240,0.6));
  padding: 22px;
  margin-bottom: 20px;
  border-radius: 20px;
  border: 1px solid rgba(232,223,245,0.5);
  transition: all 0.3s;
}

.question:hover {
  box-shadow: 0 8px 25px rgba(138,107,175,0.12);
}

.question-text {
  color: var(--deep);
  margin-bottom: 10px;
  font-weight: 600;
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.3em;
}

.options {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 12px;
}

.option {
  padding: 14px 18px;
  background: rgba(255,255,255,0.7);
  border: 2px solid var(--lavender);
  border-radius: 15px;
  cursor: pointer;
  transition: all 0.3s;
  color: var(--text);
  font-weight: 500;
}

.option:hover {
  background: linear-gradient(135deg, var(--lavender), var(--rose));
  border-color: var(--soft);
  transform: translateX(5px);
}

.option.selected {
  background: linear-gradient(135deg, var(--lavender), var(--soft));
  color: var(--deep);
  border-color: var(--soft);
}

.option.correct {
  background: linear-gradient(135deg, rgba(212,241,232,0.8), rgba(107,168,137,0.3));
  border-color: var(--success);
  color: #4a8a6a;
  font-weight: 600;
}

.option.incorrect {
  background: linear-gradient(135deg, rgba(247,214,224,0.8), rgba(201,123,132,0.3));
  border-color: var(--danger);
  color: #a85a63;
  font-weight: 600;
}

.feedback {
  padding: 12px 16px;
  border-radius: 15px;
  margin-top: 10px;
  font-weight: 500;
  display: none;
}

.feedback.show { display: block; animation: fadeIn 0.3s ease; }

.feedback.correct {
  background: linear-gradient(135deg, rgba(212,241,232,0.6), rgba(107,168,137,0.2));
  color: #4a8a6a;
  border-left: 4px solid var(--success);
}

.feedback.incorrect {
  background: linear-gradient(135deg, rgba(247,214,224,0.6), rgba(201,123,132,0.2));
  color: #a85a63;
  border-left: 4px solid var(--danger);
}

/* Flashcards */
.flashcard {
  background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(252,228,214,0.4));
  border-radius: 25px;
  padding: 50px 30px;
  min-height: 280px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  border: 2px solid rgba(232,223,245,0.8);
  margin: 25px 0;
  transition: all 0.4s;
  box-shadow: 0 8px 30px rgba(138,107,175,0.15);
  text-align: center;
}

.flashcard:hover {
  transform: translateY(-5px) rotateX(3deg);
  box-shadow: 0 15px 45px rgba(138,107,175,0.25);
}

.flashcard-front {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2.2em;
  font-weight: 600;
  color: var(--deep);
  line-height: 1.3;
}

.flashcard-back {
  font-size: 1.1em;
  color: var(--text);
  line-height: 1.6;
  white-space: pre-line;
}

.flashcard-controls {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
}

#cardCounter {
  color: var(--text-light);
  font-style: italic;
  margin: 15px 0;
  text-align: center;
}

@media (max-width: 768px) {
  .stats { grid-template-columns: repeat(2, 1fr); }
  .content { padding: 20px; }
  header h1 { font-size: 1.8em; }
  .mode-btn { min-width: 100%; }
  .flashcard-front { font-size: 1.6em; }
  .flashcard { padding: 35px 20px; min-height: 220px; }
  .top-nav { padding: 12px 18px; }
  .logo { font-size: 18px; }
}
</style>
</head>

<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>

<div class="top-nav">
  <div class="logo">Natalie <span>English</span></div>
  <button class="back-btn" onclick="showModeSelector()">⬅️ Все юниты</button>
</div>

<div class="container">

  <div class="content">

      <button class="mode-btn" onclick="showFlashcards()">🃏 Карточки</button>

    <div id="unitSelection">

      <div class="unit-selector" id="unitGrid"></div>

    <div id="theoryView" class="theory-section hidden"></div>
    <div id="exerciseView" class="hidden"></div>
    <div id="flashcardView" class="hidden"></div>
  </div>
</div>

let currentUnit = null;
let currentCardIdx = 0;
let isFlipped = false;

function init() {
  const grid = document.getElementById('unitGrid');
  let totalColl = 0;
  let totalQ = 0;
  for (let k in U) {
    totalColl += U[k].i.length;
    totalQ += U[k].q.length;
    const btn = document.createElement('div');
    btn.className = 'unit-btn';
    btn.innerHTML = `<strong>Unit ${k}</strong><small>${U[k].t}</small>`;
    btn.onclick = () => selectUnit(k);
    grid.appendChild(btn);
  }
  document.getElementById('statCollocations').innerText = totalColl;
  document.getElementById('statExercises').innerText = totalQ;
}

function selectUnit(id) {
  currentUnit = id;
  document.getElementById('unitSelection').classList.add('hidden');
  document.getElementById('modeSelector').classList.remove('hidden');
  showTheory();
}

function showModeSelector() {
  document.getElementById('unitSelection').classList.remove('hidden');
  document.getElementById('modeSelector').classList.add('hidden');
  document.getElementById('theoryView').classList.add('hidden');
  document.getElementById('exerciseView').classList.add('hidden');
  document.getElementById('flashcardView').classList.add('hidden');
}

function setActiveMode(btnText) {
  document.querySelectorAll('.mode-btn').forEach(b => {
    b.classList.remove('active');
    if(b.innerText.includes(btnText)) b.classList.add('active');
  });
}

function showTheory() {
  setActiveMode('Теория');
  document.getElementById('theoryView').classList.remove('hidden');
  document.getElementById('exerciseView').classList.add('hidden');
  document.getElementById('flashcardView').classList.add('hidden');
  
  const data = U[currentUnit];
  let html = `<h2 class="theory-title">Unit ${currentUnit}: ${data.t}</h2>`;
  data.i.forEach(item => {
    html += `
      <div class="collocation-card">
        <div class="collocation-en">${item[0]}</div>
        <div class="collocation-ru">${item[1]}</div>
        <div class="collocation-example">💡 ${item[2]}</div>
      </div>
    `;
  });
  document.getElementById('theoryView').innerHTML = html;
}

function showExercise() {
  setActiveMode('Упражнения');
  document.getElementById('theoryView').classList.add('hidden');
  document.getElementById('exerciseView').classList.remove('hidden');
  document.getElementById('flashcardView').classList.add('hidden');
  
  const data = U[currentUnit];
  let html = `<h2 class="exercise-title">Упражнения: Unit ${currentUnit}</h2>`;
  
  data.q.forEach((q, idx) => {
    const prompt = q[0];
    const sentence = q[1];
    const correctIdx = q[2];
    const options = [q[3], q[4], q[5]];

    html += `
      <div class="question" id="q${idx}">
        <div class="question-text">${idx + 1}. ${prompt}</div>
        <div class="exercise-sentence">"${sentence}"</div>
        <div class="options">
          ${options.map((opt, i) => `<div class="option" onclick="checkAnswer(${idx}, ${i}, ${correctIdx})">${opt}</div>`).join('')}
        </div>
        <div class="feedback" id="fb${idx}"></div>
      </div>
    `;
  });
  document.getElementById('exerciseView').innerHTML = html;
}

function checkAnswer(qIdx, selected, correct) {
  const qDiv = document.getElementById(`q${qIdx}`);
  const opts = qDiv.querySelectorAll('.option');
  const fb = document.getElementById(`fb${qIdx}`);
  
  opts.forEach((o, i) => {
    o.classList.remove('selected', 'correct', 'incorrect');
    if (i === correct) o.classList.add('correct');
    if (i === selected && selected !== correct) o.classList.add('incorrect');
  });
  
  if (selected === correct) {
    fb.className = 'feedback show correct';
    fb.innerText = '✅ Отлично! Верно.';
  } else {
    fb.className = 'feedback show incorrect';
    fb.innerText = '❌ Ошибка. Правильный вариант выделен зеленым.';
  }
}

function showFlashcards() {
  setActiveMode('Карточки');
  document.getElementById('theoryView').classList.add('hidden');
  document.getElementById('exerciseView').classList.add('hidden');
  document.getElementById('flashcardView').classList.remove('hidden');
  
  currentCardIdx = 0;
  isFlipped = false;
  renderCard();
}

function renderCard() {
  const data = U[currentUnit];
  const card = data.i[currentCardIdx];
  const view = document.getElementById('flashcardView');
  
  view.innerHTML = `
    <h2 class="exercise-title">Карточки: Unit ${currentUnit}</h2>
    <div id="cardCounter">${currentCardIdx + 1} / ${data.i.length}</div>
    <div class="flashcard" onclick="flipCard()">
      ${isFlipped 
        ? `<div class="flashcard-back"><strong>${card[0]}</strong><br><br>${card[1]}<br><br><em style="color:var(--soft)">${card[2]}</em></div>`
        : `<div class="flashcard-front">${card[0]}</div>`
      }
    </div>
    <div class="flashcard-controls">
      <button class="nav-btn" onclick="prevCard()" ${currentCardIdx === 0 ? 'disabled' : ''}>⬅️ Назад</button>
      <button class="nav-btn" onclick="flipCard()">🔄 Перевернуть</button>
      <button class="nav-btn" onclick="nextCard()" ${currentCardIdx === data.i.length - 1 ? 'disabled' : ''}>Вперед ➡️</button>
    </div>
  `;
}

function flipCard() {
  isFlipped = !isFlipped;
  renderCard();
}

function nextCard() {
  if (currentCardIdx < U[currentUnit].i.length - 1) {
    currentCardIdx++;
    isFlipped = false;
    renderCard();
  }
}

function prevCard() {
  if (currentCardIdx > 0) {
    currentCardIdx--;
    isFlipped = false;
    renderCard();
  }
}

init();
</script>
