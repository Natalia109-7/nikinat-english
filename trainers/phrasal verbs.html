<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Фразовые глаголы · Natalie English</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --lavender: #e8dff5;
    --peach: #fce4d6;
    --mint: #d4f1e8;
    --rose: #f7d6e0;
    --cream: #fdf6f0;
    --deep: #5a4a7a;
    --soft: #8b7ba8;
    --text: #3d3554;
    --text-light: #8b7ba8;
    --success: #6ba889;
    --danger: #c97b84;
    --warning: #d4a574;
    --shadow: 0 10px 40px rgba(138,107,175,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Montserrat', sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, var(--cream) 0%, var(--lavender) 50%, var(--peach) 100%);
    background-attachment: fixed;
    color: var(--text);
    overflow-x: hidden;
    padding: 20px;
  }

  /* Плавающие декоративные круги */
  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.4;
    z-index: -1;
    pointer-events: none;
    animation: float 20s ease-in-out infinite;
  }
  .blob1 { width: 400px; height: 400px; background: var(--rose); top: -100px; left: -100px; }
  .blob2 { width: 500px; height: 500px; background: var(--mint); bottom: -150px; right: -150px; animation-delay: -10s; }
  .blob3 { width: 300px; height: 300px; background: var(--lavender); top: 50%; left: 50%; animation-delay: -5s; }

  @keyframes float {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(50px, -50px) scale(1.1); }
    66% { transform: translate(-30px, 40px) scale(0.95); }
  }

  /* Верхняя навигация */
  .top-nav {
    max-width: 1000px;
    margin: 0 auto 25px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 25px;
    background: rgba(253,246,240,0.7);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 40px;
    border: 1px solid rgba(255,255,255,0.5);
    box-shadow: var(--shadow);
  }

  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--deep);
    letter-spacing: 1px;
  }
  .logo span { color: var(--soft); font-style: italic; }

  .back-btn {
    padding: 10px 22px;
    background: linear-gradient(135deg, var(--deep), var(--soft));
    color: white;
    text-decoration: none;
    border-radius: 30px;
    font-size: 13px;
    font-weight: 500;
    box-shadow: 0 6px 20px rgba(90,74,122,0.25);
    transition: all 0.3s;
  }
  .back-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(90,74,122,0.35);
  }

  .container {
    max-width: 1000px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    padding: 35px 20px;
    background: rgba(255,255,255,0.5);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 30px;
    border: 1px solid rgba(255,255,255,0.6);
    box-shadow: var(--shadow);
    margin-bottom: 25px;
  }

  header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.5em;
    font-weight: 500;
    color: var(--deep);
    margin-bottom: 10px;
    letter-spacing: 0.5px;
  }

  header p {
    color: var(--soft);
    font-size: 1em;
    font-style: italic;
  }

  /* Режимы */
  .modes {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin-bottom: 20px;
  }

  .mode-btn {
    padding: 12px 24px;
    border: 1px solid rgba(232,223,245,0.8);
    border-radius: 30px;
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(10px);
    color: var(--text);
    font-family: 'Montserrat', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s ease;
    font-size: 0.95em;
  }

  .mode-btn:hover {
    transform: translateY(-3px);
    background: linear-gradient(135deg, var(--lavender), var(--rose));
    box-shadow: 0 8px 20px rgba(138,107,175,0.2);
  }

  .mode-btn.active {
    background: linear-gradient(135deg, var(--deep), var(--soft));
    color: white;
    border-color: transparent;
    box-shadow: 0 8px 20px rgba(90,74,122,0.3);
  }

  /* Категории */
  .categories {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 25px;
  }

  .cat-btn {
    padding: 9px 18px;
    border: 1px solid rgba(232,223,245,0.8);
    border-radius: 25px;
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(10px);
    color: var(--text);
    font-family: 'Montserrat', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s ease;
    font-size: 0.88em;
  }

  .cat-btn:hover {
    transform: translateY(-2px);
    background: linear-gradient(135deg, var(--lavender), var(--rose));
    box-shadow: 0 6px 15px rgba(138,107,175,0.2);
  }

  .cat-btn.active {
    background: linear-gradient(135deg, var(--soft), var(--deep));
    color: white;
    border-color: transparent;
    box-shadow: 0 6px 15px rgba(90,74,122,0.3);
  }

  /* Карточка */
  .card {
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 30px;
    padding: 35px;
    border: 1px solid rgba(255,255,255,0.8);
    box-shadow: var(--shadow);
    animation: fadeIn 0.5s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .progress-bar {
    height: 8px;
    background: rgba(232,223,245,0.5);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 20px;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--success), var(--soft), var(--deep));
    border-radius: 4px;
    transition: width 0.5s ease;
  }

  .counter {
    text-align: center;
    color: var(--text-light);
    font-size: 0.9em;
    margin-bottom: 12px;
    letter-spacing: 0.5px;
  }

  .sentence {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5em;
    text-align: center;
    margin: 20px 0;
    line-height: 1.5;
    color: var(--deep);
    font-weight: 500;
  }

  .translation {
    text-align: center;
    color: var(--text-light);
    font-size: 0.95em;
    font-style: italic;
    margin-bottom: 15px;
  }

  .input-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    margin: 20px 0;
  }

  .answer-input {
    padding: 14px 22px;
    border: 2px solid var(--lavender);
    border-radius: 25px;
    background: rgba(255,255,255,0.8);
    font-size: 1.05em;
    font-family: 'Montserrat', sans-serif;
    text-align: center;
    width: 220px;
    outline: none;
    transition: all 0.3s ease;
    color: var(--text);
  }

  .answer-input.wide {
    width: 90%;
    max-width: 700px;
    text-align: left;
    border-radius: 20px;
  }

  .answer-input:focus {
    border-color: var(--soft);
    box-shadow: 0 0 0 4px rgba(139,123,168,0.15);
    background: white;
  }

  .answer-input.correct {
    border-color: var(--success);
    background: rgba(212,241,232,0.4);
    color: var(--success);
    font-weight: 500;
  }

  .answer-input.wrong {
    border-color: var(--danger);
    background: rgba(247,214,224,0.4);
    color: var(--danger);
    font-weight: 500;
    animation: shake 0.4s ease;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }

  .btn {
    padding: 12px 26px;
    border: none;
    border-radius: 30px;
    font-size: 0.95em;
    font-family: 'Montserrat', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s ease;
    letter-spacing: 0.3px;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--deep), var(--soft));
    color: white;
    box-shadow: 0 6px 18px rgba(90,74,122,0.25);
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(90,74,122,0.35);
  }

  .btn-secondary {
    background: rgba(255,255,255,0.7);
    color: var(--deep);
    border: 1px solid var(--lavender);
  }

  .btn-secondary:hover {
    background: linear-gradient(135deg, var(--lavender), var(--rose));
    transform: translateY(-2px);
  }

  .feedback {
    text-align: center;
    min-height: 28px;
    margin-top: 12px;
    font-size: 1em;
    font-weight: 500;
    transition: all 0.3s ease;
    line-height: 1.5;
  }

  .feedback.correct { color: var(--success); }
  .feedback.wrong { color: var(--danger); }

  .hint {
    text-align: center;
    color: var(--text-light);
    font-size: 0.9em;
    margin-top: 8px;
    font-style: italic;
  }

  .stats {
    display: flex;
    justify-content: space-around;
    margin-top: 25px;
    padding-top: 25px;
    border-top: 1px solid var(--lavender);
    flex-wrap: wrap;
    gap: 15px;
  }

  .stat { text-align: center; min-width: 90px; }

  .stat-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.9em;
    font-weight: 600;
    color: var(--deep);
  }

  .stat-label {
    font-size: 0.82em;
    color: var(--text-light);
    margin-top: 3px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .btn-row {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 18px;
    flex-wrap: wrap;
  }

  /* Глоссарий */
  .glossary-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0 8px;
    margin-top: 15px;
  }

  .glossary-table th {
    text-align: left;
    padding: 10px 15px;
    color: var(--text-light);
    font-size: 0.85em;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .glossary-table td {
    padding: 14px 18px;
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(5px);
    border-radius: 14px;
    font-size: 0.95em;
    border: 1px solid rgba(255,255,255,0.7);
  }

  .glossary-table tr td:first-child {
    font-weight: 600;
    color: var(--deep);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1em;
  }

  .glossary-table tr td:nth-child(2) {
    color: var(--text);
  }

  .glossary-table tr td:last-child {
    color: var(--text-light);
    font-size: 0.9em;
    font-style: italic;
  }

  /* Тест (соответствия) */
  .match-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin: 20px 0;
  }

  .match-item {
    padding: 14px 18px;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(10px);
    border: 2px solid rgba(232,223,245,0.8);
    border-radius: 18px;
    cursor: pointer;
    transition: all 0.3s ease;
    font-size: 0.95em;
    text-align: center;
    color: var(--text);
  }

  .match-item:hover {
    background: rgba(255,255,255,0.9);
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(138,107,175,0.15);
  }

  .match-item.selected {
    border-color: var(--deep);
    background: linear-gradient(135deg, var(--lavender), var(--rose));
    box-shadow: 0 6px 18px rgba(90,74,122,0.25);
    color: var(--deep);
    font-weight: 500;
  }

  .match-item.matched {
    border-color: var(--success);
    background: rgba(212,241,232,0.5);
    color: var(--success);
    cursor: default;
    font-weight: 500;
  }

  .match-item.wrong-match {
    border-color: var(--danger);
    background: rgba(247,214,224,0.5);
    animation: shake 0.4s ease;
  }

  .answer-box {
    background: rgba(232,223,245,0.3);
    border: 1px dashed var(--soft);
    border-radius: 18px;
    padding: 18px 22px;
    margin: 15px 0;
    color: var(--text);
    font-size: 1em;
    line-height: 1.5;
  }

  .answer-box strong {
    color: var(--deep);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1em;
  }

  @media (max-width: 600px) {
    header h1 { font-size: 1.7em; }
    .sentence { font-size: 1.2em; }
    .card { padding: 22px 18px; }
    .match-grid { grid-template-columns: 1fr; }
    .glossary-table td, .glossary-table th { padding: 10px 12px; font-size: 0.85em; }
    .answer-input.wide { width: 100%; }
    .top-nav { padding: 12px 18px; }
    .logo { font-size: 18px; }
  }
</style>
</head>
<body>

<div class="blob blob1"></div>

<div class="top-nav">
  <div class="logo">Natalie <span>English</span></div>
  <a href="../index.html" class="back-btn">← На главную</a>

<div class="container">

</div>

// ============ ЛОГИКА ПРИЛОЖЕНИЯ ============

let currentMode = 'fill';
let currentCategory = 'BE';
let currentQuestions = [];
let currentIndex = 0;
let correctCount = 0;
let wrongCount = 0;
let matchState = { selected: null, matchedPairs: 0, totalPairs: 0 };

const modesEl = document.getElementById('modes');
const categoriesEl = document.getElementById('categories');
const mainCard = document.getElementById('mainCard');

Object.keys(fillExercises).forEach(cat => {
  const btn = document.createElement('button');
  btn.className = 'cat-btn' + (cat === currentCategory ? ' active' : '');
  btn.textContent = cat;
  btn.onclick = (e) => { selectCategory(cat, e); };
  categoriesEl.appendChild(btn);
});

modesEl.addEventListener('click', (e) => {
  if (e.target.classList.contains('mode-btn')) {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    currentMode = e.target.dataset.mode;
    loadMode();
  }
});

function selectCategory(cat, e) {
  currentCategory = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  loadMode();
}

function loadMode() {
  if (currentMode === 'fill') loadFill();
  else if (currentMode === 'translate') loadTranslate();
  else if (currentMode === 'match') loadMatch();
  else if (currentMode === 'glossary') loadGlossary();
}

function loadFill() {
  currentQuestions = [...fillExercises[currentCategory]].sort(() => Math.random() - 0.5);
  currentIndex = 0;
  correctCount = 0;
  wrongCount = 0;
  showFillQuestion();
}

function showFillQuestion() {
  if (currentIndex >= currentQuestions.length) { showFillFinal(); return; }
  const q = currentQuestions[currentIndex];
  mainCard.innerHTML = `
    <div class="progress-bar">
      <div class="progress-fill" style="width: ${(currentIndex / currentQuestions.length) * 100}%"></div>
    </div>
    <div class="counter">Вопрос ${currentIndex + 1} из ${currentQuestions.length}</div>
    <div class="sentence">${q.s}</div>
    <div class="translation">${q.t}</div>
    <div class="input-wrapper">
      <input type="text" class="answer-input" id="answerInput" placeholder="предлог" autocomplete="off">
      <button class="btn btn-primary" id="checkBtn">Проверить</button>
    </div>
    <div class="feedback" id="feedback"></div>
    <div class="hint" id="hint"></div>
    <div class="btn-row">
      <button class="btn btn-secondary" id="hintBtn">💡 Подсказка</button>
      <button class="btn btn-secondary" id="skipBtn">Пропустить →</button>
    </div>
    <div class="stats">
      <div class="stat"><div class="stat-value" id="correctCount">0</div><div class="stat-label">Верно</div></div>
      <div class="stat"><div class="stat-value" id="wrongCount">0</div><div class="stat-label">Ошибок</div></div>
      <div class="stat"><div class="stat-value" id="percentCount">0%</div><div class="stat-label">Точность</div></div>
    </div>
  `;
  document.getElementById('checkBtn').onclick = checkFillAnswer;
  document.getElementById('answerInput').onkeydown = (e) => { if (e.key === 'Enter') checkFillAnswer(); };
  document.getElementById('hintBtn').onclick = () => {
    document.getElementById('hint').textContent = '💡 Ответ: ' + q.a.join(' / ');
  };
  document.getElementById('skipBtn').onclick = () => {
    document.getElementById('feedback').innerHTML = `Пропущено. Ответ: <b>${q.a[0]}</b>`;
    document.getElementById('feedback').className = 'feedback wrong';
    wrongCount++;
    updateStats();
    setTimeout(() => { currentIndex++; showFillQuestion(); }, 1500);
  };
  document.getElementById('answerInput').focus();
}

function checkFillAnswer() {
  const input = document.getElementById('answerInput');
  const userAnswer = input.value.trim().toLowerCase();
  if (!userAnswer) return;
  const q = currentQuestions[currentIndex];
  const correct = q.a.map(a => a.toLowerCase());
  if (correct.includes(userAnswer)) {
    input.classList.add('correct');
    document.getElementById('feedback').textContent = ' Верно! Отлично!';
    document.getElementById('feedback').className = 'feedback correct';
    correctCount++;
    setTimeout(() => { currentIndex++; showFillQuestion(); }, 1200);
  } else {
    input.classList.add('wrong');
    document.getElementById('feedback').innerHTML = `Не совсем... Правильный ответ: <b>${q.a[0]}</b>`;
    document.getElementById('feedback').className = 'feedback wrong';
    wrongCount++;
    setTimeout(() => { currentIndex++; showFillQuestion(); }, 2200);
  }
  updateStats();
}

function updateStats() {
  document.getElementById('correctCount').textContent = correctCount;
  document.getElementById('wrongCount').textContent = wrongCount;
  const total = correctCount + wrongCount;
  const percent = total ? Math.round((correctCount / total) * 100) : 0;
  document.getElementById('percentCount').textContent = percent + '%';
}

function showFillFinal() {
  const total = correctCount + wrongCount;
  const percent = total ? Math.round((correctCount / total) * 100) : 0;
  mainCard.innerHTML = `
    <div class="progress-bar"><div class="progress-fill" style="width: 100%"></div></div>
    <div class="counter">Готово!</div>
    <div class="sentence"> Категория <b>${currentCategory}</b> пройдена!<br>Результат: ${correctCount} из ${total} (${percent}%)</div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="loadFill()">🔄 Пройти ещё раз</button>
    </div>
    <div class="stats">
      <div class="stat"><div class="stat-value">${correctCount}</div><div class="stat-label">Верно</div></div>
      <div class="stat"><div class="stat-value">${wrongCount}</div><div class="stat-label">Ошибок</div></div>
      <div class="stat"><div class="stat-value">${percent}%</div><div class="stat-label">Точность</div></div>
    </div>
  `;
}

function loadTranslate() {
  currentQuestions = [...translateExercises[currentCategory]].sort(() => Math.random() - 0.5);
  currentIndex = 0;
  correctCount = 0;
  wrongCount = 0;
  showTranslateQuestion();
}

function showTranslateQuestion() {
  if (currentIndex >= currentQuestions.length) { showTranslateFinal(); return; }
  const q = currentQuestions[currentIndex];
  mainCard.innerHTML = `
    <div class="progress-bar">
      <div class="progress-fill" style="width: ${(currentIndex / currentQuestions.length) * 100}%"></div>
    </div>
    <div class="counter">🌐 Перевод ${currentIndex + 1} из ${currentQuestions.length}</div>
    <div class="sentence" style="font-size: 1.2em;">Переведите на английский:</div>
    <div class="translation" style="font-size: 1.15em; font-style: normal; color: var(--text); font-weight: 500; margin: 20px 0;">
      «${q.ru}»
    </div>
    <div class="input-wrapper">
      <input type="text" class="answer-input wide" id="answerInput" placeholder="Введите перевод на английском..." autocomplete="off">
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="checkBtn">✓ Проверить</button>
      <button class="btn btn-secondary" id="showAnswerBtn">👁 Показать ответ</button>
      <button class="btn btn-secondary" id="skipBtn">Пропустить →</button>
    </div>
    <div class="feedback" id="feedback"></div>
    <div class="stats">
      <div class="stat"><div class="stat-value" id="correctCount">0</div><div class="stat-label">Верно</div></div>
      <div class="stat"><div class="stat-value" id="wrongCount">0</div><div class="stat-label">Ошибок</div></div>
      <div class="stat"><div class="stat-value" id="percentCount">0%</div><div class="stat-label">Точность</div></div>
    </div>
  `;
  const input = document.getElementById('answerInput');
  input.focus();
  input.onkeydown = (e) => { if (e.key === 'Enter') checkTranslateAnswer(); };
  document.getElementById('checkBtn').onclick = checkTranslateAnswer;
  document.getElementById('showAnswerBtn').onclick = () => showTranslateAnswer();
  document.getElementById('skipBtn').onclick = () => {
    wrongCount++;
    updateStats();
    currentIndex++;
    showTranslateQuestion();
  };
}

function normalize(str) {
  return str.toLowerCase().replace(/[^\w\s']/g, '').replace(/\s+/g, ' ').trim();
}

function checkTranslateAnswer() {
  const input = document.getElementById('answerInput');
  const userAnswer = input.value.trim();
  if (!userAnswer) return;
  const q = currentQuestions[currentIndex];
  const userNorm = normalize(userAnswer);
  const correctNorm = normalize(q.en);
  const feedback = document.getElementById('feedback');
  const keysFound = q.keys.every(key => userNorm.includes(normalize(key)));

  if (userNorm === correctNorm) {
    input.classList.add('correct');
    feedback.innerHTML = `✨ Идеально! <br><small style="color:var(--text-light)">${q.en}</small>`;
    feedback.className = 'feedback correct';
    correctCount++;
    setTimeout(() => { currentIndex++; showTranslateQuestion(); }, 2000);
  } else if (keysFound && userNorm.length > correctNorm.length * 0.5) {
    input.classList.add('correct');
    feedback.innerHTML = `👍 Хорошо! Ключевой глагол на месте.<br><small style="color:var(--text-light)">Эталон: <b>${q.en}</b></small>`;
    feedback.className = 'feedback correct';
    correctCount++;
    setTimeout(() => { currentIndex++; showTranslateQuestion(); }, 2500);
  } else {
    input.classList.add('wrong');
    feedback.innerHTML = `✗ Не совсем...<br><small style="color:var(--text-light)">Правильный ответ: <b>${q.en}</b></small>`;
    feedback.className = 'feedback wrong';
    wrongCount++;
    setTimeout(() => { currentIndex++; showTranslateQuestion(); }, 3000);
  }
  updateStats();
}

function showTranslateAnswer() {
  const q = currentQuestions[currentIndex];
  const feedback = document.getElementById('feedback');
  feedback.innerHTML = `<div class="answer-box"><strong>Ответ:</strong> ${q.en}</div>`;
  feedback.className = 'feedback';
}

function showTranslateFinal() {
  const total = correctCount + wrongCount;
  const percent = total ? Math.round((correctCount / total) * 100) : 0;
  mainCard.innerHTML = `
    <div class="progress-bar"><div class="progress-fill" style="width: 100%"></div></div>
    <div class="counter">Готово!</div>
    <div class="sentence">🎉 Категория <b>${currentCategory}</b> пройдена!<br>Результат: ${correctCount} из ${total} (${percent}%)</div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="loadTranslate()">🔄 Пройти ещё раз</button>
    </div>
    <div class="stats">
      <div class="stat"><div class="stat-value">${correctCount}</div><div class="stat-label">Верно</div></div>
      <div class="stat"><div class="stat-value">${wrongCount}</div><div class="stat-label">Ошибок</div></div>
      <div class="stat"><div class="stat-value">${percent}%</div><div class="stat-label">Точность</div></div>
    </div>
  `;
}

function loadMatch() {
  const data = [...matchExercises[currentCategory]].sort(() => Math.random() - 0.5);
  matchState = { selected: null, matchedPairs: 0, totalPairs: data.length, data: data };
  const leftItems = data.map((d, i) => `<div class="match-item" data-type="l" data-idx="${i}">${d.l}</div>`).join('');
  const shuffledRight = [...data].sort(() => Math.random() - 0.5).map((d) => {
    const origIdx = data.indexOf(d);
    return `<div class="match-item" data-type="r" data-idx="${origIdx}">${d.r}</div>`;
  }).join('');

  mainCard.innerHTML = `
    <div class="counter">Соедините фразовый глагол с его значением</div>
    <div class="match-grid">
      <div>${leftItems}</div>
      <div>${shuffledRight}</div>
    </div>
    <div class="feedback" id="feedback"></div>
    <div class="stats">
      <div class="stat"><div class="stat-value" id="matchedCount">0</div><div class="stat-label">Найдено пар</div></div>
      <div class="stat"><div class="stat-value">${data.length}</div><div class="stat-label">Всего пар</div></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="loadMatch()">🔄 Заново</button>
    </div>
  `;
  document.querySelectorAll('.match-item').forEach(item => {
    item.onclick = () => handleMatchClick(item);
  });
}

function handleMatchClick(item) {
  if (item.classList.contains('matched')) return;
  if (!matchState.selected) {
    document.querySelectorAll('.match-item.selected').forEach(el => el.classList.remove('selected'));
    item.classList.add('selected');
    matchState.selected = item;
    return;
  }
  if (matchState.selected === item) {
    item.classList.remove('selected');
    matchState.selected = null;
    return;
  }
  if (matchState.selected.dataset.type === item.dataset.type) {
    document.querySelectorAll('.match-item.selected').forEach(el => el.classList.remove('selected'));
    item.classList.add('selected');
    matchState.selected = item;
    return;
  }
  const idx1 = matchState.selected.dataset.idx;
  const idx2 = item.dataset.idx;
  if (idx1 === idx2) {
    matchState.selected.classList.remove('selected');
    matchState.selected.classList.add('matched');
    item.classList.add('matched');
    matchState.matchedPairs++;
    document.getElementById('matchedCount').textContent = matchState.matchedPairs;
    if (matchState.matchedPairs === matchState.totalPairs) {
      document.getElementById('feedback').textContent = '🎉 Отлично! Все пары найдены!';
      document.getElementById('feedback').className = 'feedback correct';
    }
  } else {
    item.classList.add('wrong-match');
    matchState.selected.classList.add('wrong-match');
    const prev = matchState.selected;
    setTimeout(() => {
      item.classList.remove('wrong-match');
      prev.classList.remove('wrong-match');
    }, 600);
  }
  matchState.selected = null;
}

  const data = glossary[currentCategory];

    <tr>
      <td>${d.phr}</td>

      <table class="glossary-table">
        <thead>
          <tr>
            <th>Фразовый глагол</th>
            <th>Значение</th>
            <th>Пример</th>
          </tr>

        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}
