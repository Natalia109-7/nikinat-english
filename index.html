<script>
  // ============ НАВИГАЦИЯ (РАБОТАЕТ ВСЕГДА, НЕЗАВИСИМО ОТ FIREBASE) ============
  function showPage(pageId) {
    document.querySelectorAll('.nav-link').forEach(a => a.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    
    const link = document.querySelector(`.nav-link[data-page="${pageId}"]`);
    const page = document.getElementById(pageId);
    
    if (link && page) {
      link.classList.add('active');
      page.classList.add('active');
      window.scrollTo({top: 0, behavior: 'smooth'});
    }
  }

  // Обработка кликов по навигации
  document.querySelectorAll('.nav-link').forEach(link => {
    link.addEventListener('click', function(e) {
      e.preventDefault();
      const pageId = this.dataset.page;
      showPage(pageId);
      
      if (pageId === 'home') {
        history.pushState(null, '', window.location.pathname);
      } else {
        history.pushState(null, '', '#' + pageId);
      }
    });
  });

  // Обработка загрузки страницы
  document.addEventListener('DOMContentLoaded', () => {
    const hash = window.location.hash.substring(1);
    if (hash && document.getElementById(hash)) {
      showPage(hash);
    } else {
      showPage('home');
    }
  });

  // Обработка кнопки "назад"
  window.addEventListener('popstate', () => {
    const hash = window.location.hash.substring(1);
    if (hash && document.getElementById(hash)) {
      showPage(hash);
    } else {
      showPage('home');
    }
  });

  // Закрытие модалок по Escape
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      document.querySelectorAll('.trainer-modal').forEach(m => m.remove());
      closeModal();
    }
  });

  // Закрытие модалки по клику вне изображения
  document.getElementById('imgModal').addEventListener('click', (e) => {
    if (e.target.id === 'imgModal') closeModal();
  });

  function openModal(src){ 
    const modal = document.getElementById('imgModal');
    const img = document.getElementById('modalImg');
    if (modal && img) {
      img.src = src; 
      modal.classList.add('active'); 
    }
  }
  
  function closeModal(){ 
    const modal = document.getElementById('imgModal');
    if (modal) modal.classList.remove('active'); 
  }

  // ============ FIREBASE (ЗАГРУЗКА ДАННЫХ) ============
  if (typeof firebase === 'undefined') {
    console.error('Firebase не загрузился!');
    
    // Показываем сообщение об ошибке в разделах
    const sections = ['programs-list', 'articles-list', 'videos-list', 'gallery-list'];
    sections.forEach(id => {
      const el = document.getElementById(id);
      if (el) el.innerHTML = '<div class="empty">Не удалось загрузить данные. Проверьте интернет-соединение.</div>';
    });
  } else {
    const firebaseConfig = {
      apiKey: "AIzaSyC9WFkK_cmQGt7pNd926W4kIeo4C8p3H3I",
      authDomain: "nikinat-english.firebaseapp.com",
      projectId: "nikinat-english",
      storageBucket: "nikinat-english.firebasestorage.app",
      messagingSenderId: "820894083136",
      appId: "1:820894083136:web:24ba3bddbe4f1ba719d7a5"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Загрузка программ и тренажёров
    function renderPrograms(){
      const el = document.getElementById('programs-list');
      if (!el) return;
      
      Promise.all([
          db.collection('programs').orderBy('createdAt','desc').get(),
          db.collection('trainers').orderBy('createdAt','desc').get()
      ]).then(([progSnap, trainSnap]) => {
          const programs = progSnap.docs.map(d=>({id:d.id, ...d.data()}));
          const trainers = trainSnap.docs.map(d=>({id:d.id, ...d.data()}));
          
          if(!programs.length && !trainers.length){
              el.innerHTML='<div class="empty">Программы и тренажёры скоро появятся </div>';
              return;
          }
          
          let html = '';
          
          programs.forEach((p,i)=>{
              html += '<div class="card" style="animation-delay:'+i*0.1+'s">' +
                  (p.imageUrl?'<img src="'+p.imageUrl+'" alt="">':'') +
                  '<h3>'+p.title+'</h3>' +
                  '<p>'+(p.description||'').replace(/\n/g,'<br>')+'</p>' +
                  '</div>';
          });
          
          trainers.forEach((t,i)=>{
              const safeTitle = t.title.replace(/'/g, "\\'").replace(/"/g, '&quot;');
              const safeFile = t.file.replace(/'/g, "\\'").replace(/"/g, '&quot;');
              html += '<div class="card" style="animation-delay:'+(programs.length+i)*0.1+'s; cursor:pointer" data-trainer-file="'+safeFile+'" data-trainer-title="'+safeTitle+'">' +
                  '<div style="font-size:48px; text-align:center; margin-bottom:16px">🎮</div>' +
                  '<h3>'+t.title+'</h3>' +
                  '<p>'+(t.description||'').replace(/\n/g,'<br>')+'</p>' +
                  '<button class="btn" style="margin-top:12px; font-size:13px; padding:10px 20px">Открыть тренажёр →</button>' +
                  '</div>';
          });
          
          el.innerHTML = html;
          
          el.querySelectorAll('[data-trainer-file]').forEach(card => {
            card.addEventListener('click', function() {
              openTrainer(this.dataset.trainerFile, this.dataset.trainerTitle);
            });
          });
      }).catch(err=>{
          console.error('Ошибка загрузки программ:', err);
          el.innerHTML='<div class="empty">Ошибка загрузки 😔</div>';
      });
    }

    function openTrainer(file, title){
        window.open(file, '_blank');
    }

    function renderArticles(items){
      const el = document.getElementById('articles-list');
      if (!el) return;
      if(!items.length){ el.innerHTML='<div class="empty">Статьи скоро появятся </div>'; return; }
      el.innerHTML = items.map((a,i)=>'<div class="card" style="animation-delay:'+i*0.1+'s">' +
          (a.imageUrl?'<img src="'+a.imageUrl+'" alt="">':'') +
          '<div class="date">'+(a.date||'')+'</div>' +
          '<h3>'+a.title+'</h3>' +
          '<p>'+(a.content||'').replace(/\n/g,'<br>')+'</p>' +
          '</div>').join('');
    }

    function renderVideos(items){
      const el = document.getElementById('videos-list');
      if (!el) return;
      if(!items.length){ el.innerHTML='<div class="empty">Видео скоро появятся </div>'; return; }
      el.innerHTML = items.map((v,i)=>{
        const id = v.url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([^&?\s]+)/);
        const embed = id ? '<iframe src="https://www.youtube.com/embed/'+id[1]+'" allowfullscreen></iframe>' : '';
        return '<div class="video-card" style="animation:slideUp 0.6s ease '+i*0.1+'s backwards">' +
          embed +
          '<div class="info"><h4>'+v.title+'</h4><p>'+(v.description||'')+'</p></div>' +
          '</div>';
      }).join('');
    }

    function renderGallery(items){
      const el = document.getElementById('gallery-list');
      if (!el) return;
      if(!items.length){ el.innerHTML='<div class="empty">Фото скоро появятся </div>'; return; }
      el.innerHTML = items.map((g,i)=>'<div class="gallery-item" style="animation:slideUp 0.6s ease '+i*0.05+'s backwards" onclick="openModal(\''+g.imageUrl+'\')">' +
          '<img src="'+g.imageUrl+'" alt="'+(g.caption||'')+'">' +
          '</div>').join('');
    }

    // Запуск загрузки
    renderPrograms();
    
    db.collection('articles').orderBy('createdAt','desc').onSnapshot(snap=>{
      const items = snap.docs.map(d=>({id:d.id, ...d.data()}));
      renderArticles(items);
    }, err=>{ 
      console.error('Ошибка загрузки статей:', err); 
      const el = document.getElementById('articles-list');
      if (el) el.innerHTML='<div class="empty">Ошибка 😔</div>'; 
    });
    
    db.collection('videos').orderBy('createdAt','desc').onSnapshot(snap=>{
      const items = snap.docs.map(d=>({id:d.id, ...d.data()}));
      renderVideos(items);
    }, err=>{ 
      console.error('Ошибка загрузки видео:', err); 
      const el = document.getElementById('videos-list');
      if (el) el.innerHTML='<div class="empty">Ошибка 😔</div>'; 
    });
    
    db.collection('gallery').orderBy('createdAt','desc').onSnapshot(snap=>{
      const items = snap.docs.map(d=>({id:d.id, ...d.data()}));
      renderGallery(items);
    }, err=>{ 
      console.error('Ошибка загрузки галереи:', err); 
      const el = document.getElementById('gallery-list');
      if (el) el.innerHTML='<div class="empty">Ошибка 😔</div>'; 
    });
  }
</script>
